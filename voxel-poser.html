    _q.setFromAxisAngle(UP, -sim.yawBody);
    t4.applyQuaternion(_q);
    const lY = THREE.MathUtils.clamp(Math.atan2(t4.x, Math.max(t4.z, 0.02)), -1.15, 1.15);
    const lP = THREE.MathUtils.clamp(Math.atan2(-t4.y, Math.hypot(t4.x, t4.z)), -0.6, 0.95);
    hYaw   += (lY - hYaw)*gw;
    hPitch += (lP - hPitch)*gw;
  }
  Q.head.setFromAxisAngle(UP, sim.yawBody + hYaw + sim.yawHead);
  t4.set(1,0,0);
  _q.setFromAxisAngle(t4, hPitch);
  Q.head.multiply(_q);
  J.headDir.set(0,1,0).applyQuaternion(Q.head);

  // limbs (hinge-limited two-bone IK)
  // hands: brace toward the ground when tipping over, then compensate the IK
  // target by the measured wrist->grip-contact offset for tip-accurate placement
  HEFL.copy(T.handL);
  HEFR.copy(T.handR);
  if(tiltW > 0){
    if(!(drag && drag.key === 'handL')){
      t4.set(-DIM.shx*1.1, 0, 0).applyQuaternion(_yq).add(CEFF).addScaledVector(LEANV, 8*V);
      t4.y = 2*V;
      HEFL.lerp(t4, tiltW*0.9);
    }
    if(!(drag && drag.key === 'handR')){
      t4.set( DIM.shx*1.1, 0, 0).applyQuaternion(_yq).add(CEFF).addScaledVector(LEANV, 8*V);
      t4.y = 2*V;
      HEFR.lerp(t4, tiltW*0.9);
    }
  }
  HEFL.sub(J.shL);
  let rl = HEFL.length() || 1e-9;
  HEFL.multiplyScalar((rl - Math.min(HOFF.L, rl*0.45))/rl).add(J.shL);
  HEFR.sub(J.shR);
  rl = HEFR.length() || 1e-9;
  HEFR.multiplyScalar((rl - Math.min(HOFF.R, rl*0.45))/rl).add(J.shR);
  twoBone(J.shL,  HEFL, T.elbowL, DIM.armU, DIM.armF, _bA, _fw, -1, J.elbowL, J.wristL, B.armL);
  twoBone(J.shR,  HEFR, T.elbowR, DIM.armU, DIM.armF, _bA, _fw, -1, J.elbowR, J.wristR, B.armR);
  twoBone(J.hipL, T.footL, T.kneeL,  DIM.legU, DIM.legF, _bL, _fw,  1, J.kneeL,  J.ankleL, B.legL);
  twoBone(J.hipR, T.footR, T.kneeR,  DIM.legU, DIM.legF, _bL, _fw,  1, J.kneeR,  J.ankleR, B.legR);

  // gizmos snap to solved joints (sticky, always reachable)
  gizmos.chest.position.copy(CEFF);
  t4.set(0,0,1).applyQuaternion(Q.head);
  gizmos.head.position.copy(J.neck).addScaledVector(J.headDir, 5.5*V).addScaledVector(t4, 3*V);
  gizmos.handL.position.copy(J.wristL); gizmos.handR.position.copy(J.wristR);
  gizmos.footL.position.copy(J.ankleL); gizmos.footR.position.copy(J.ankleR);
  gizmos.elbowL.position.copy(J.elbowL); gizmos.elbowR.position.copy(J.elbowR);
  gizmos.kneeL.position.copy(J.kneeL);  gizmos.kneeR.position.copy(J.kneeR);

  present();  jitFlush();
}

// shared: place meshes + rings + rig lines from J / Q / B
function present(){
  placeSegment(parts.upperL, J.shL, J.elbowL, B.armL);
  placeSegment(parts.foreL,  J.elbowL, J.wristL, B.armL);
  placeSegment(parts.upperR, J.shR, J.elbowR, B.armR);
  placeSegment(parts.foreR,  J.elbowR, J.wristR, B.armR);
  placeSegment(parts.thighL, J.hipL, J.kneeL, B.legL);
  placeSegment(parts.shinL,  J.kneeL, J.ankleL, B.legL);
  placeSegment(parts.thighR, J.hipR, J.kneeR, B.legR);
  placeSegment(parts.shinR,  J.kneeR, J.ankleR, B.legR);
  placeHand('L'); placeHand('R');
  if(swordMesh){
    // right-fist props (business end +X out the thumb side)
    const rp = swordMesh.visible ? swordMesh : axeMesh.visible ? axeMesh
             : knifeMesh.visible ? knifeMesh : null;
    if(rp){
      t4.set(0, -1*V, -0.6*V).applyQuaternion(parts.palmR.quaternion);
      rp.position.copy(parts.palmR.position).add(t4);
      rp.quaternion.copy(parts.palmR.quaternion).multiply(WFLIP);
      applyGearOffset(rp, rp===swordMesh?'sword':rp===axeMesh?'axe':'knife');
    }
    if(gunMesh.visible){
      // a pistol aims down the FOREARM: barrel (+X) along elbow->wrist,
      // grip (-Y) hanging perpendicular, nested in the fist
      t4.subVectors(parts.palmR.position, parts.foreR.position).normalize();
      t5.set(0, 1, 0).addScaledVector(t4, -t4.y).normalize();    // up, ⟂ barrel
      t6.crossVectors(t4, t5).normalize();
      _bm.makeBasis(t4, t5, t6);
      gunMesh.quaternion.setFromRotationMatrix(_bm);
      gunMesh.position.copy(parts.palmR.position)
        .addScaledVector(t4, 0.9*V).addScaledVector(t5, 0.5*V);
      applyGearOffset(gunMesh, 'gun');
    }
    if(bowMesh.visible){
      // a bow hangs vertical with its belly along the bow arm, independent
      // of wrist roll: build the basis from the arm, not the palm
      t4.subVectors(parts.palmL.position, parts.upperL.position); // arm direction
      t4.y *= 0.25; t4.normalize();                               // mostly horizontal
      t5.set(0, 1, 0);                                            // limbs stay vertical
      t6.crossVectors(t4, t5).normalize();                        // bow plane normal
      t4.crossVectors(t5, t6);                                    // re-orthogonalised belly
      _bm.makeBasis(t4, t5, t6);
      bowMesh.quaternion.setFromRotationMatrix(_bm);
      bowMesh.position.copy(parts.palmL.position).addScaledVector(t4, 0.4*V);
      bowMesh.position.y -= 0.2*V;
      applyGearOffset(bowMesh, 'bow');
    }
    if(skiLMesh.visible){                           // one ski under each foot, foot's own yaw
      for(const [m, f] of [[skiLMesh,'footL'],[skiRMesh,'footR']]){
        t4.set(0, -1.4*V, 1*V).applyQuaternion(parts[f].quaternion);
        m.position.copy(parts[f].position).add(t4);
        m.position.y = Math.max(m.position.y, 0.6*V);
        m.quaternion.copy(parts[f].quaternion);
        applyGearOffset(m, 'skis');
      }
    }
    if(boardMesh.visible){                          // board spans the feet
      boardMesh.position.copy(parts.footL.position).add(parts.footR.position).multiplyScalar(0.5);
      boardMesh.position.y = Math.max(boardMesh.position.y - 1.4*V, 0.6*V);
      t4.subVectors(parts.footR.position, parts.footL.position);
      boardMesh.quaternion.setFromAxisAngle(UP, Math.atan2(t4.x, t4.z));
      applyGearOffset(boardMesh, 'board');
    }
  }

  parts.pelvis.position.copy(J.pelvis); parts.pelvis.quaternion.copy(Q.pelvis);
  parts.chest.position.copy(J.spine);   parts.chest.quaternion.copy(Q.chest);
  parts.head.position.copy(J.neck);     parts.head.quaternion.copy(Q.head);
  if(window.pHair){
    pHair.position.copy(J.neck); pHair.quaternion.copy(Q.head);
    // hair rides the head: same scale multipliers as the head mesh
    const hs = (typeof EDIT !== 'undefined') ? EDIT.head : null;
    if(hs) pHair.scale.set(hs.wid, hs.len, hs.hei); else pHair.scale.set(1,1,1);
  }
  for(const pk of ['pelvis','chest','head','footL','footR']){
    if(parts[pk]) applyPartRot(parts[pk]);
    const o = parts[pk] && parts[pk].userData._off;
    if(o){ parts[pk].position.x += o.x; parts[pk].position.y += o.y; parts[pk].position.z += o.z; }
  }
  if(window.pHair && parts.head.userData._off){ const o = parts.head.userData._off; pHair.position.x += o.x; pHair.position.y += o.y; pHair.position.z += o.z; }
  _yq.setFromAxisAngle(UP, sim.yawBody + sim.fyL);
  parts.footL.position.copy(J.ankleL);  parts.footL.quaternion.copy(_yq);
  _yq.setFromAxisAngle(UP, sim.yawBody + sim.fyR);
  parts.footR.position.copy(J.ankleR);  parts.footR.quaternion.copy(_yq);
  _yq.setFromAxisAngle(UP, sim.yawBody);

  ringHips.m.position.copy(J.pelvis);
  ringHead.m.position.copy(J.neck).addScaledVector(J.headDir, 4.5*V);

  if(rigLines.visible){
  const a = rigLines.geometry.attributes.position.array;
  let i = 0;
  const seg = (p, q)=>{ a[i++]=p.x;a[i++]=p.y;a[i++]=p.z; a[i++]=q.x;a[i++]=q.y;a[i++]=q.z; };
  seg(J.pelvis, J.neck); seg(J.neck, gizmos.head.position);
  seg(J.shL, J.shR); seg(J.hipL, J.hipR);
  seg(J.shL, J.elbowL); seg(J.elbowL, J.wristL);
  seg(J.shR, J.elbowR); seg(J.elbowR, J.wristR);
  seg(J.hipL, J.kneeL); seg(J.kneeL, J.ankleL);
  seg(J.hipR, J.kneeR); seg(J.kneeR, J.ankleR);
  seg(J.spine, J.shL); seg(J.spine, J.shR); seg(J.pelvis, J.spine);
  rigLines.geometry.attributes.position.needsUpdate = true;
  }
  const liftY = terrainLift(parts, [window.pHair, ringHips.m, ringHead.m,
                      typeof ringTwistL !== 'undefined' && ringTwistL.m,
                      typeof ringTwistR !== 'undefined' && ringTwistR.m,
                      typeof swordMesh !== 'undefined' && swordMesh, typeof axeMesh !== 'undefined' && axeMesh,
                      typeof knifeMesh !== 'undefined' && knifeMesh, typeof gunMesh !== 'undefined' && gunMesh,
                      typeof bowMesh !== 'undefined' && bowMesh, typeof packMesh !== 'undefined' && packMesh],
              T.chest.x, T.chest.z);
  rigLines.position.y = liftY;                       // line overlay rides along
  if(liftY > 0) for(const k in gizmos) gizmos[k].position.y += liftY;
  updateStalks();                                    // stalks read lifted gizmos — handles sit ON the body
}

/* ---------- yaw rings (head + hips) ---------- */
function makeRing(radius, color, hitTube){
  const m = new THREE.Mesh(
    new THREE.TorusGeometry(radius, 0.0032, 8, 72),
    new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.5, depthTest:false})
  );
  m.rotation.x = Math.PI/2;
  m.renderOrder = 12;
  const hit = new THREE.Mesh(
    new THREE.TorusGeometry(radius, hitTube || 0.017, 6, 36),
    new THREE.MeshBasicMaterial({transparent:true, opacity:0, depthWrite:false})
  );
  m.add(hit);
  scene.add(m);
  return {m, hit};
}
const ringHead = makeRing(0.10, 0x8ef7c2);
const ringHips = makeRing(0.135, 0xf78ee0);
const ringTwistL = makeRing(0.027, 0x7aa2ff, 0.01);
const ringTwistR = makeRing(0.027, 0x7aa2ff, 0.01);
ringHead.hit.userData.key = 'yawHead';
ringHips.hit.userData.key = 'yawBody';
ringTwistL.hit.userData.key = 'twistL';
ringTwistR.hit.userData.key = 'twistR';
hitMeshes.push(ringHead.hit, ringHips.hit, ringTwistL.hit, ringTwistR.hit);

/* ---------- articulated hands ----------
   Hand frame = forearm orientation ⊗ wrist twist. Fingers are a two-segment
   mitten hinged at the knuckle line; grip in [0,1] curls proximal, distal and
   thumb by fixed ratios — a pure function of state, so deterministic. */
const _hq = new THREE.Quaternion(), _hq2 = new THREE.Quaternion();
function placeHand(S){
  const sign = S === 'L' ? 1 : -1;
  const st = HAND[S];
  const wrist = S === 'L' ? J.wristL : J.wristR;
  // finger attachment offsets must grow with the hand so digits stay joined
  const hL = (typeof EDIT !== 'undefined' ? EDIT.hands.len : 1);   // along the fingers
  const hW = (typeof EDIT !== 'undefined' ? EDIT.hands.wid : 1);   // across the palm
  _hq.copy(parts['fore'+S].quaternion);
  t4.set(0,1,0);
  _hq2.setFromAxisAngle(t4, st.twist);
  _hq.multiply(_hq2);                                // hand frame
  const palm = parts['palm'+S];
  palm.position.copy(wrist); palm.quaternion.copy(_hq);

  const finP = parts['finP'+S];
  t4.set(0, -1*V*hL, 0).applyQuaternion(_hq);
  finP.position.copy(wrist).add(t4);                 // knuckle line
  t4.set(1,0,0);
  _hq2.setFromAxisAngle(t4, st.grip*1.55);
  finP.quaternion.copy(_hq).multiply(_hq2);

  const finD = parts['finD'+S];
  t4.set(0, -1*V*hL, 0).applyQuaternion(finP.quaternion);
  finD.position.copy(finP.position).add(t4);
  t4.set(1,0,0);
  _hq2.setFromAxisAngle(t4, st.grip*1.25);
  finD.quaternion.copy(finP.quaternion).multiply(_hq2);

  const th = parts['thumb'+S];
  // opposing thumb: splay closes and the pivot sweeps toward the palm as grip rises
  t4.set(sign*(1.5 - st.grip*0.5)*V*hW, -0.3*V*hL, 0).applyQuaternion(_hq);
  th.position.copy(wrist).add(t4);
  t4.set(0,0,1);
  _hq2.setFromAxisAngle(t4, -sign*(0.7 - st.grip*0.55));
  th.quaternion.copy(_hq).multiply(_hq2);
  t4.set(1,0,0);
  _hq2.setFromAxisAngle(t4, st.grip*1.4);
  th.quaternion.multiply(_hq2);

  // controls: blue hand gizmo at the wrist (clear of the fingers), amber grip
  // gizmo at the fingertips
  gizmos['hand'+S].position.copy(wrist);
  t4.set(0, -1*V, 0).applyQuaternion(finD.quaternion);
  gizmos['grip'+S].position.copy(finD.position).add(t4);
  // arm IK compensates only the LONGITUDINAL grip-contact extension (a
  // rotation-invariant scalar) — full-vector compensation precesses
  t4.copy(gizmos['grip'+S].position).sub(finP.position).multiplyScalar(0.75)
    .add(finP.position).sub(wrist);
  t5.set(0,1,0).applyQuaternion(_hq);
  const hs = THREE.MathUtils.clamp(-t4.dot(t5), 0, 5*V);
  HOFF[S] += (hs - HOFF[S])*0.3;
  const ring = S === 'L' ? ringTwistL : ringTwistR;
  t4.set(0, 2*V, 0).applyQuaternion(parts['fore'+S].quaternion);
  ring.m.position.copy(wrist).add(t4);              // up the forearm, clear of handles
  t4.set(1,0,0);
  _hq2.setFromAxisAngle(t4, Math.PI/2);
  ring.m.quaternion.copy(parts['fore'+S].quaternion).multiply(_hq2);
}

/* ---------- ragdoll: position-based Verlet dynamics ----------
   Particles carry voxel-derived masses; distance constraints are the bones
   (so nothing can ever dislocate), hinge projections keep knees/elbows on
   the anatomical side, shoulders/hips are kinematic anchors recomputed
   from the torso frame every iteration. Fixed timestep => deterministic. */
const P_KEYS = ['pelvis','chest','head','elbowL','wristL','elbowR','wristR','kneeL','ankleL','kneeR','ankleR'];
const PT = {};
{
  const rad = {pelvis:0.16, chest:0.18, head:0.26, elbowL:0.09, elbowR:0.09,
               wristL:0.09, wristR:0.09, kneeL:0.11, kneeR:0.11, ankleL:0.105, ankleR:0.105};
  for(const k of P_KEYS) PT[k] = {pos:new THREE.Vector3(), prev:new THREE.Vector3(), w:1, kg:1, rad:rad[k]};
}
const COUNTS = {};
function computeMasses(){
  const g = {
    pelvis: COUNTS.pelvis||1, chest: COUNTS.chest||1, head: COUNTS.head||1,
    elbowL: COUNTS.upperL||1,
    wristL: (COUNTS.foreL||1)+(COUNTS.palmL||0)+(COUNTS.finPL||0)+(COUNTS.finDL||0)+(COUNTS.thumbL||0),
    elbowR: COUNTS.upperR||1,
    wristR: (COUNTS.foreR||1)+(COUNTS.palmR||0)+(COUNTS.finPR||0)+(COUNTS.finDR||0)+(COUNTS.thumbR||0),
    kneeL: COUNTS.thighL||1, ankleL: (COUNTS.shinL||1)+(COUNTS.footL||0),
    kneeR: COUNTS.thighR||1, ankleR: (COUNTS.shinR||1)+(COUNTS.footR||0),
  };
  let tot = 0; for(const k in g) tot += g[k];
  if(sim.kgAuto){
    // voxel volume, scaled to ~1.75m stature, effective body density
    sim.kg = Math.round(tot * V*V*V * 0.343 * 350);
    const inp = document.getElementById('kgInput');
    if(inp) inp.value = sim.kg;
  }
  for(const k of P_KEYS){
    PT[k].kg = Math.max(sim.kg * g[k]/tot, 0.4);
    PT[k].w = 1/PT[k].kg;
  }
}
const RAG = {spine: 10*V, headLen: 5*V};
const A_shL=new THREE.Vector3(), A_shR=new THREE.Vector3(),
      A_hipL=new THREE.Vector3(), A_hipR=new THREE.Vector3();

function initRagdoll(){
  PT.pelvis.pos.copy(J.pelvis);
  PT.chest.pos.copy(J.neck);
  PT.head.pos.copy(J.neck).addScaledVector(J.headDir, 4.5*V);
  PT.elbowL.pos.copy(J.elbowL); PT.wristL.pos.copy(J.wristL);
  PT.elbowR.pos.copy(J.elbowR); PT.wristR.pos.copy(J.wristR);
  PT.kneeL.pos.copy(J.kneeL);   PT.ankleL.pos.copy(J.ankleL);
  PT.kneeR.pos.copy(J.kneeR);   PT.ankleR.pos.copy(J.ankleR);
  for(const k of P_KEYS) PT[k].prev.copy(PT[k].pos);
}
function distC(a, b, rest){
  t5.subVectors(b.pos, a.pos);
  const d = t5.length() || 1e-9;
  const s = (d - rest)/d/(a.w + b.w);
  a.pos.addScaledVector(t5,  s*a.w);
  b.pos.addScaledVector(t5, -s*b.w);
}
function anchorC(anchor, b, rest){                  // anchor has infinite mass
  t5.subVectors(b.pos, anchor);
  const d = t5.length() || 1e-9;
  b.pos.addScaledVector(t5, -(d - rest)/d);
}
function hingeC(root, mid, end, fwd, sign){         // keep mid on allowed side
  _ax.subVectors(end, root);
  const al = _ax.length(); if(al < 1e-6) return;
  _ax.multiplyScalar(1/al);
  _fp.copy(fwd).addScaledVector(_ax, -fwd.dot(_ax));
  if(_fp.lengthSq() < 1e-6) return;
  _fp.normalize().multiplyScalar(sign);
  _pr.subVectors(mid.pos, root);
  _pr.addScaledVector(_ax, -_pr.dot(_ax));
  const d = _pr.dot(_fp);
  if(d < 0.004) mid.pos.addScaledVector(_fp, 0.004 - d);
}
function ragdollStep(dt){
  const damp = THREE.MathUtils.lerp(0.955, 0.992,
    THREE.MathUtils.clamp((sim.kg - 25)/150, 0, 1));     // heavier carries momentum
  const gy = -9.8*dt*dt;
  for(const k of P_KEYS){
    const p = PT[k];
    t1.subVectors(p.pos, p.prev).multiplyScalar(damp);
    p.prev.copy(p.pos);
    p.pos.add(t1);
    p.pos.y += gy;
  }
  if(drag && drag.pin) PT[drag.pin].pos.lerp(drag.point, drag.alpha);
  fwdYaw(_fw);
  for(let it=0; it<5; it++){
    // torso frame -> kinematic shoulder/hip anchors
    t2.subVectors(PT.chest.pos, PT.pelvis.pos);
    basisQuat(_q, t2, _fw);
    A_shL.set(-DIM.shx, -1.5*V, 0).applyQuaternion(_q).add(PT.chest.pos);
    A_shR.set( DIM.shx, -1.5*V, 0).applyQuaternion(_q).add(PT.chest.pos);
    A_hipL.set(-DIM.hipx, -2*V, 0).applyQuaternion(_q).add(PT.pelvis.pos);
    A_hipR.set( DIM.hipx, -2*V, 0).applyQuaternion(_q).add(PT.pelvis.pos);

    distC(PT.pelvis, PT.chest, RAG.spine);
    anchorC(PT.chest.pos, PT.head, RAG.headLen);
    anchorC(A_shL, PT.elbowL, DIM.armU); distC(PT.elbowL, PT.wristL, DIM.armF);
    anchorC(A_shR, PT.elbowR, DIM.armU); distC(PT.elbowR, PT.wristR, DIM.armF);
    anchorC(A_hipL, PT.kneeL, DIM.legU); distC(PT.kneeL, PT.ankleL, DIM.legF);
    anchorC(A_hipR, PT.kneeR, DIM.legU); distC(PT.kneeR, PT.ankleR, DIM.legF);

    hingeC(A_shL, PT.elbowL, PT.wristL.pos, _fw, -1);
    hingeC(A_shR, PT.elbowR, PT.wristR.pos, _fw, -1);
    hingeC(A_hipL, PT.kneeL, PT.ankleL.pos, _fw, 1);
    hingeC(A_hipR, PT.kneeR, PT.ankleR.pos, _fw, 1);

    for(const k of P_KEYS){                          // ground + friction
      const p = PT[k];
      if(p.pos.y < p.rad){
        p.pos.y = p.rad;
        p.prev.x += (p.pos.x - p.prev.x)*0.5;
        p.prev.z += (p.pos.z - p.prev.z)*0.5;
      }
    }
  }
}
function ragdollPresent(){
  fwdYaw(_fw);
  J.pelvis.copy(PT.pelvis.pos);
  t2.subVectors(PT.chest.pos, PT.pelvis.pos);
  basisQuat(Q.chest, t2, _fw);
  Q.pelvis.copy(Q.chest);
  J.spine.copy(J.pelvis).add(t4.set(0, DIM.pelvTop, 0).applyQuaternion(Q.pelvis));
  J.neck.copy(PT.chest.pos);
  J.shL.copy(PT.chest.pos).add(t4.set(-DIM.shx, -1.5*V, 0).applyQuaternion(Q.chest));
  J.shR.copy(PT.chest.pos).add(t4.set( DIM.shx, -1.5*V, 0).applyQuaternion(Q.chest));
  J.hipL.copy(PT.pelvis.pos).add(t4.set(-DIM.hipx, -2*V, 0).applyQuaternion(Q.pelvis));
  J.hipR.copy(PT.pelvis.pos).add(t4.set( DIM.hipx, -2*V, 0).applyQuaternion(Q.pelvis));

  t3.subVectors(PT.head.pos, J.neck);
  if(t3.lengthSq() < 1e-8) t3.set(0,1,0.1);
  t3.normalize();
  J.headDir.copy(t3);
  t4.copy(_fw).addScaledVector(t3, -t3.dot(_fw));
  basisQuat(Q.head, t3, t4.lengthSq() > 1e-6 ? t4 : FWD);
  _q.setFromAxisAngle(J.headDir, sim.yawHead);
  Q.head.premultiply(_q);

  const limb = (sh, mid, end, jm, je, bend, def, sign)=>{
    jm.copy(mid.pos); je.copy(end.pos);
    _ax.subVectors(je, sh);
    const al = _ax.length();
    bend.subVectors(jm, sh);
    if(al > 1e-6){
      _ax.multiplyScalar(1/al);
      bend.addScaledVector(_ax, -bend.dot(_ax));
    }
    if(bend.lengthSq() < 1e-6) bend.copy(_fw).multiplyScalar(sign);
    bend.normalize();
  };
  limb(J.shL, PT.elbowL, PT.wristL, J.elbowL, J.wristL, B.armL, _fw, -1);
  limb(J.shR, PT.elbowR, PT.wristR, J.elbowR, J.wristR, B.armR, _fw, -1);
  limb(J.hipL, PT.kneeL, PT.ankleL, J.kneeL, J.ankleL, B.legL, _fw, 1);
  limb(J.hipR, PT.kneeR, PT.ankleR, J.kneeR, J.ankleR, B.legR, _fw, 1);

  gizmos.chest.position.copy(PT.chest.pos);
  gizmos.head.position.copy(PT.head.pos);
  gizmos.handL.position.copy(PT.wristL.pos); gizmos.handR.position.copy(PT.wristR.pos);
  gizmos.footL.position.copy(PT.ankleL.pos); gizmos.footR.position.copy(PT.ankleR.pos);
  gizmos.elbowL.position.copy(PT.elbowL.pos); gizmos.elbowR.position.copy(PT.elbowR.pos);
  gizmos.kneeL.position.copy(PT.kneeL.pos);  gizmos.kneeR.position.copy(PT.kneeR.pos);

  present();
}
// freeze ragdoll back into editable pose targets
function bakePoseFromRagdoll(){
  t2.subVectors(PT.chest.pos, PT.pelvis.pos).normalize();
  T.chest.copy(PT.pelvis.pos).addScaledVector(t2, DIM.spine);
  T.chest.y = THREE.MathUtils.clamp(T.chest.y, 9*V, 30*V);
  T.head.copy(PT.head.pos);
  t4.subVectors(PT.head.pos, PT.chest.pos);
  _q.setFromAxisAngle(UP, -sim.yawBody);
  t4.applyQuaternion(_q);
  const bh = Math.hypot(t4.x, t4.z);
  sim.headYawM = bh > 0.4*V
    ? THREE.MathUtils.clamp(Math.atan2(t4.x, t4.z), -1.45, 1.45) * Math.min(1, bh/(2*V))
    : 0;
  T.handL.copy(PT.wristL.pos); T.handR.copy(PT.wristR.pos);
  T.elbowL.copy(PT.elbowL.pos); T.elbowR.copy(PT.elbowR.pos);
  T.kneeL.copy(PT.kneeL.pos);  T.kneeR.copy(PT.kneeR.pos);
  T.footL.copy(PT.ankleL.pos); T.footL.y = Math.max(T.footL.y, 1.6*V);
  T.footR.copy(PT.ankleR.pos); T.footR.y = Math.max(T.footR.y, 1.6*V);
}
function setMode(m){
  if(sim.mode === m) return;
  if(m === 'Ragdoll') initRagdoll();
  else bakePoseFromRagdoll();
  sim.mode = m;
  refresh();
}

/* ---------- pose-mode leg dangle + balance stepping ----------
   Dangling legs are a damped rod pendulum (fixed length from the hip) with
   muscle tone easing them toward hanging straight down and a swing cone so
   they never flail above the hips. When the chest carries the body past the
   feet's support area, the leading foot takes a quick arced catch-step. */
function dangleSide(s, hip, foot, knee, key, dt){
  if(drag && drag.key === key){ s.on = false; return; } // user posing wins
  const reach = DIM.legU + DIM.legF;
  const rod = reach*0.97;
  if(!s.on){
    t1.subVectors(foot, hip);
    // posed kicks / slight overstretch stay put — only a genuine lift releases
    if(t1.length() <= reach + 6*V) return;
    s.on = true;
    s.p.copy(hip).addScaledVector(t1.normalize(), rod);
    s.pp.copy(s.p);
  }
  t2.subVectors(s.p, s.pp).multiplyScalar(0.92);    // verlet, heavy damping
  s.pp.copy(s.p);
  s.p.add(t2);
  s.p.y -= 9.8*dt*dt;
  t2.set(hip.x, hip.y - rod, hip.z);                // muscle tone -> hang point
  s.p.lerp(t2, 0.05);
  t2.subVectors(s.p, hip);                          // rod constraint
  t2.multiplyScalar(1/(t2.length() || 1e-9));
  const minDown = 0.57;                             // swing cone ~55 deg
  if(-t2.y < minDown){
    const h = Math.hypot(t2.x, t2.z) || 1e-9;
    const hs = Math.sqrt(1 - minDown*minDown)/h;
    t2.x *= hs; t2.z *= hs; t2.y = -minDown;
    s.pp.lerp(s.p, 0.35);                           // bleed outward momentum
  }
  s.p.copy(hip).addScaledVector(t2, rod);
  if(s.p.y < 2*V){                                  // ground: plant
    s.p.y = 2*V;
    s.on = false;
  }
  foot.copy(s.p);
  knee.copy(hip).lerp(s.p, 0.5).addScaledVector(_fw, 0.3);
}
function tryStep(){
  if(LOCO.active) return;                           // gait owns the feet
  if(STEP.cool > 0) return;
  if(STEP.L.on || STEP.R.on || DGL.L.on || DGL.R.on) return;
  if(drag && (drag.key === 'footL' || drag.key === 'footR')) return;
  if(T.footL.y > 3*V || T.footR.y > 3*V) return;    // a lifted foot = deliberate stance
  t1.addVectors(T.footL, T.footR).multiplyScalar(0.5);
  t2.set(CEFF.x - t1.x, 0, CEFF.z - t1.z);
  const err = t2.length();
  if(err >= 6.5*V){
    // catch: the leading-side foot steps out under the fall
    t2.multiplyScalar(1/err);
    const dL = (T.footL.x - t1.x)*t2.x + (T.footL.z - t1.z)*t2.z;
    const dR = (T.footR.x - t1.x)*t2.x + (T.footR.z - t1.z)*t2.z;
    const S = dL > dR ? 'L' : 'R';
    const st = STEP[S];
    st.on = true; st.t = 0;
    STEP.cool = 0.3;
    st.from.copy(T['foot'+S]);
    _yq.setFromAxisAngle(UP, sim.yawBody);
    t4.set(S === 'L' ? -DIM.hipx*1.3 : DIM.hipx*1.3, 0, 0).applyQuaternion(_yq);
    st.to.set(CEFF.x + t4.x + t2.x*3*V, 2*V, CEFF.z + t4.z + t2.z*3*V);
    return;
  }
  // gather: CLEARLY balanced (dead band below the catch threshold, so the
  // two never ping-pong) but overstretched -> the TRAILING foot steps up
  // beside the lead; the lead never snaps back
  if(err >= 4.5*V) return;
  t2.subVectors(T.footR, T.footL);
  if(Math.hypot(t2.x, t2.z) > 9.5*V){
    stanceSlot('L', t1); const offL = T.footL.distanceTo(t1);
    stanceSlot('R', t3); const offR = T.footR.distanceTo(t3);
    const S = offL > offR ? 'L' : 'R';
    const st = STEP[S];
    st.on = true; st.t = 0;
    STEP.cool = 0.3;
    st.from.copy(T['foot'+S]);
    st.to.copy(S === 'L' ? t1 : t3);
  }
}
function stepUpdate(s, foot, knee, hip, dt){
  if(!s.on) return;
  s.t += dt/0.22;                                   // 220ms catch-step
  const e = THREE.MathUtils.clamp(s.t, 0, 1);       // t<0 = delayed start
  const ee = e*e*(3 - 2*e);
  foot.set(
    s.from.x + (s.to.x - s.from.x)*ee,
    2*V + Math.sin(Math.PI*e)*4.5*V,                // lift arc
    s.from.z + (s.to.z - s.from.z)*ee
  );
  knee.copy(hip).lerp(foot, 0.5).addScaledVector(_fw, 0.3);
  if(s.t >= 1){ foot.copy(s.to); s.on = false; }
}
function releaseLag(dt){
  const rh = LAG.h * Math.min(1, 16*dt);            // head catches up fast (~60ms)
  T.head.y += rh; LAG.h -= rh;
  const ra = LAG.a * Math.min(1, 9*dt);             // arms swing later (~110ms)
  T.handL.y += ra; T.handR.y += ra;
  T.elbowL.y += ra; T.elbowR.y += ra;
  LAG.a -= ra;
}
function flushLag(){
  T.head.y += LAG.h; LAG.h = 0;
  T.handL.y += LAG.a; T.handR.y += LAG.a;
  T.elbowL.y += LAG.a; T.elbowR.y += LAG.a;
  LAG.a = 0;
}
function stanceSlot(S, out){
  _yq.setFromAxisAngle(UP, sim.yawBody);
  t4.set(S === 'L' ? -DIM.hipx*1.15 : DIM.hipx*1.15, 0, 0).applyQuaternion(_yq);
  // CEFF, not T.chest: the catch-step aims at CEFF, so the slots must too,
  // or a persistent pull offset makes catch and gather fight forever
  out.set(CEFF.x + t4.x, 2*V, CEFF.z + t4.z);
}
// after a fall landing settles: fix only badly-placed feet; held stances persist
function squareStance(){
  STEP.cool = 0.35;
  for(const S of ['L','R']){
    const st = STEP[S], foot = T['foot'+S];
    stanceSlot(S, t1);
    if(!st.on && foot.distanceTo(t1) > 4*V){
      st.on = true; st.t = 0;
      st.from.copy(foot); st.to.copy(t1);
    }
  }
}
function gravityStep(dt){
  // released above standing -> free fall; on contact a damped spring takes
  // over (knees compress, bounce, settle to a straight stand). Head and arms
  // carry follow-through debt so they trail and bob through the impact.
  if(LOCO.air){ FALL.vy = 0; return; }              // the jump owns mid-air physics
  const landY = 26*V;
  if(drag && drag.key === 'chest'){ FALL.vy = 0; FALL.spring = false; flushLag(); return; }
  if(!FALL.spring && T.chest.y <= landY + 1e-4){ FALL.vy = 0; releaseLag(dt); return; }
  let dy = 0;
  if(!FALL.spring){
    FALL.vy -= 9.8*dt;
    dy = FALL.vy*dt;
    if(T.chest.y + dy <= landY) FALL.spring = true; // contact: spring takes the energy
  }
  if(FALL.spring){
    const k = 90, c = 11;                           // dip = v/sqrt(k): scales with drop
    FALL.vy += (-(T.chest.y - landY)*k - FALL.vy*c)*dt;
    dy = FALL.vy*dt;
    if(Math.abs(T.chest.y + dy - landY) < 0.1*V && Math.abs(FALL.vy) < 0.06){
      dy = landY - T.chest.y;                       // settled: stand straight
      FALL.vy = 0; FALL.spring = false;
      if(!FALL.noSquare) squareStance();            // square only after real falls
      FALL.noSquare = false;
    }
  }
  if(T.chest.y + dy < 13*V){ dy = 13*V - T.chest.y; FALL.vy = 0; }
  T.chest.y += dy;
  LAG.h += dy; LAG.a += dy;                         // others trail, not teleport
  releaseLag(dt);
}
function dangleStep(dt){
  locoStep(dt);
  actStep(dt);
  cloneStep(dt);
  headTrackStep();
  gazeStep(dt);
  mouthStep(dt);
  fwdYaw(_fw);
  STEP.cool = Math.max(0, STEP.cool - dt);
  gravityStep(dt);
  dangleSide(DGL.L, J.hipL, T.footL, T.kneeL, 'footL', dt);
  dangleSide(DGL.R, J.hipR, T.footR, T.kneeR, 'footR', dt);
  tryStep();
  stepUpdate(STEP.L, T.footL, T.kneeL, J.hipL, dt);
  stepUpdate(STEP.R, T.footR, T.kneeR, J.hipR, dt);
}

/* ---------- keyframes + playback ---------- */
let CURKEY = -1;
function makeKey(){
  if(sim.mode === 'Ragdoll') bakePoseFromRagdoll();
  const k = {yawBody:sim.yawBody, yawHead:sim.yawHead, hy:sim.headYawM, t:{},
             fy:[sim.fyL, sim.fyR],
             hand:{L:{t:HAND.L.twist, g:HAND.L.grip}, R:{t:HAND.R.twist, g:HAND.R.grip}}};
  for(const n in T) k.t[n] = T[n].toArray();
  return k;
}
function snapshot(){
  anim.keys.push(makeKey());
  CURKEY = anim.keys.length - 1;
  renderKeyChips();
}
function keyOp(op){
  const ks = anim.keys;
  if(CURKEY < 0 || CURKEY >= ks.length){
    if(op !== 'prev' && op !== 'next') return;
    CURKEY = 0;
  }
  if(op === 'prev' || op === 'next'){
    if(!ks.length) return;
    CURKEY = (CURKEY + (op === 'next' ? 1 : ks.length - 1)) % ks.length;
    loadKey(CURKEY);
    return;
  }
  if(op === 'del'){
    ks.splice(CURKEY, 1);
    CURKEY = Math.min(CURKEY, ks.length - 1);
  } else if(op === 'dupe'){
    ks.splice(CURKEY + 1, 0, JSON.parse(JSON.stringify(ks[CURKEY])));
    CURKEY++;
  } else if(op === 'left' && CURKEY > 0){
    [ks[CURKEY - 1], ks[CURKEY]] = [ks[CURKEY], ks[CURKEY - 1]];
    CURKEY--;
  } else if(op === 'right' && CURKEY < ks.length - 1){
    [ks[CURKEY + 1], ks[CURKEY]] = [ks[CURKEY], ks[CURKEY + 1]];
    CURKEY++;
  } else if(op === 'hide'){
    ks[CURKEY].hidden = !ks[CURKEY].hidden;
  } else if(op === 'cap'){
    const hid = ks[CURKEY].hidden;
    ks[CURKEY] = makeKey();
    if(hid) ks[CURKEY].hidden = true;
  }
  renderKeyChips();
}
function loadKey(i){
  const k = anim.keys[i]; if(!k) return;
  if(CURKEY !== i){ CURKEY = i; renderKeyChips(); }
  anim.playing = false; updateAnimUI();
  for(const n in k.t) T[n].fromArray(k.t[n]);
  sim.yawBody = k.yawBody; sim.yawHead = k.yawHead;
  sim.headYawM = k.hy || 0;
  sim.fyL = k.fy ? k.fy[0] : 0; sim.fyR = k.fy ? k.fy[1] : 0;
  if(k.hand){
    HAND.L.twist = k.hand.L.t; HAND.L.grip = k.hand.L.g;
    HAND.R.twist = k.hand.R.t; HAND.R.grip = k.hand.R.g;
  }
  DGL.L.on = DGL.R.on = false;
  if(sim.mode === 'Ragdoll'){ sim.mode = 'Pose'; refresh(); }
}
function startPlayback(){
  if(anim.keys.length < 2) return;
  if(sim.mode === 'Ragdoll'){ sim.mode = 'Pose'; refresh(); }
  DGL.L.on = DGL.R.on = false;
  anim.t = 0;
  anim.playing = true;
  updateAnimUI();
}
const smooth = e => e*e*(3 - 2*e);

/* ---------- onion skinning ----------
   Ghost copies of the character at each keyframe pose: swap the key's state
   in, run the real solver, clone every part's transform onto flat transparent
   meshes (sharing live geometry), then restore. Earlier keys render fainter. */
const ONION = {on:false, alpha:0.25, groups:[], mats:[]};
function captureState(){
  const s = {t:{}, yawBody:sim.yawBody, yawHead:sim.yawHead, hy:sim.headYawM,
             fyL:sim.fyL, fyR:sim.fyR,
             hL:{...HAND.L}, hR:{...HAND.R}, hoffL:HOFF.L, hoffR:HOFF.R};
  for(const n in T) s.t[n] = T[n].toArray();
  return s;
}
function applyKeyState(k){
  for(const n in k.t) T[n].fromArray(k.t[n]);
  sim.yawBody = k.yawBody; sim.yawHead = k.yawHead; sim.headYawM = k.hy || 0;
  sim.fyL = k.fy ? k.fy[0] : 0; sim.fyR = k.fy ? k.fy[1] : 0;
  if(k.hand){
    HAND.L.twist = k.hand.L.t; HAND.L.grip = k.hand.L.g;
    HAND.R.twist = k.hand.R.t; HAND.R.grip = k.hand.R.g;
  }
}
function restoreState(s){
  for(const n in s.t) T[n].fromArray(s.t[n]);
  sim.yawBody = s.yawBody; sim.yawHead = s.yawHead; sim.headYawM = s.hy;
  sim.fyL = s.fyL; sim.fyR = s.fyR;
  Object.assign(HAND.L, s.hL); Object.assign(HAND.R, s.hR);
  HOFF.L = s.hoffL; HOFF.R = s.hoffR;
}
function clearGhosts(){
  for(const g of ONION.groups) scene.remove(g);
  for(const e of ONION.mats) e.mat.dispose();
  ONION.groups.length = 0;
  ONION.mats.length = 0;
}
function rebuildGhosts(){
  clearGhosts();
  if(!ONION.on || anim.keys.length === 0) return;
  const saved = captureState();
  const n = anim.keys.length;
  anim.keys.forEach((k, i)=>{
    applyKeyState(k);
    solvePose(0);
    const grad = n === 1 ? 1 : 0.35 + 0.65*i/(n - 1);
    const mat = new THREE.MeshBasicMaterial({
      color:0x7aa2ff, transparent:true, opacity:ONION.alpha*grad, depthWrite:false,
    });
    ONION.mats.push({mat, grad});
    const grp = new THREE.Group();
    for(const pk in parts){
      const src = parts[pk];
      const m = new THREE.Mesh(src.geometry, mat);
      m.position.copy(src.position);
      m.quaternion.copy(src.quaternion);
      m.scale.copy(src.scale);
      grp.add(m);
    }
    grp.renderOrder = 1;
    scene.add(grp);
    ONION.groups.push(grp);
  });
  restoreState(saved);
  solvePose(0);
}
function updateGhostOpacity(){
  for(const e of ONION.mats) e.mat.opacity = ONION.alpha*e.grad;
}

/* ---------- auto gaze ----------
   The pupils follow the action: while a limb target is being dragged the
   eyes glance toward it (in the head's own frame), otherwise they lead the
   head's yaw/pitch. State changes swap ONLY the head geometry, throttled. */
const VIS = {cur:'2', cool:0};
const _gz = new THREE.Vector3(), _gq = new THREE.Quaternion();
function refaceHead(){
  if(cfg.style === 'Boxy'){ rebuild(); return; }
  const [map, mcx, mcy, mcz] = buildHeadMap(SKINS[cfg.skin], HAIRC[cfg.hairC]);
  parts.head.geometry.dispose();
  parts.head.geometry = voxGeo(map, mcx, mcy, mcz);
  if(window.pHair){ scene.remove(pHair); pHair.geometry.dispose(); window.pHair = null; }
  if(buildHeadMap.hairMap && buildHeadMap.hairMap.size){
    window.pHair = new THREE.Mesh(
      voxGeo(upRes(buildHeadMap.hairMap, 2, true), mcx*2, mcy*2, mcz*2, V*0.5), voxMat);
    pHair.castShadow = true;
    scene.add(pHair);
  }
}
function refreshEyes(){
  if(ui.eyes) [...ui.eyes.children].forEach(b=>
    b.classList.toggle('on', b.dataset.auto ? cfg.eyesAuto : b.textContent === cfg.eyes));
}
function rebuildFace(state){
  if(cfg.eyes === state) return;
  cfg.eyes = state;
  refaceHead();
  refreshEyes();                 // chips only — no full-panel DOM walk per saccade
}
// talking: hop between visemes at speech cadence
function mouthStep(dt){
  if(cfg.mouth !== 'Talk') return;
  if(CLONE.on && CLONE.face.active) return;        // the camera drives visemes
  VIS.cool -= dt;
  if(VIS.cool > 0) return;
  VIS.cool = 0.09 + Math.random()*0.09;
  const opts = ['2','4','2L','2R','sq','2','4'];
  let nxt = opts[(Math.random()*opts.length)|0];
  if(nxt === VIS.cur) nxt = nxt === '2' ? '4' : '2';
  VIS.cur = nxt;
  refaceHead();
}
function gridState(lat, vert, tL, tV){
  const l = lat > tL ? 'L' : lat < -tL ? 'R' : '';
  const v = vert > tV ? 'Up' : vert < -tV ? 'Low' : '';
  if(!l && !v) return 'Focus';
  if(!l) return v === 'Up' ? 'Up-C' : 'Low-C';
  if(!v) return 'Mid-' + l;
  return (v === 'Up' ? 'Up-' : 'Low-') + l;
}
function desiredGaze(){
  if(GAZE.obj && !GAZE.obj.carried){
    _gz.copy(GAZE.obj.mesh.position);
    _gz.y += GAZE.obj.rad*0.7;
    _gz.sub(parts.head.position);
    _gq.copy(parts.head.quaternion).invert();
    _gz.applyQuaternion(_gq);
    _gz.y -= 3*V;
    const lat = Math.atan2(_gz.x, Math.max(0.001, Math.abs(_gz.z)));
    const vert = Math.atan2(_gz.y, Math.hypot(_gz.x, _gz.z));
    return gridState(lat, vert, 0.28, 0.33);
  }
  const k = drag && drag.key;
  if(k && /^(hand|foot|elbow|knee)/.test(k)){
    // look at what's being manipulated, in head-local space
    _gz.copy(T[k]).sub(parts.head.position);
    _gq.copy(parts.head.quaternion).invert();
    _gz.applyQuaternion(_gq);
    _gz.y -= 3*V;                                   // eye line sits up the head
    const lat = Math.atan2(_gz.x, Math.max(0.001, Math.abs(_gz.z)));
    const vert = Math.atan2(_gz.y, Math.hypot(_gz.x, _gz.z));
    return gridState(lat, vert, 0.28, 0.33);
  }
  // eyes lead the head's own turn (pitch sign: positive = looking down)
  const hy = sim.headYawM + sim.yawHead;
  return gridState(hy, -(sim.headPitch || 0), 0.45, 0.42);
}
// when an object holds the gaze, the HEAD physically tracks it:
// yaw through the manual accumulator, pitch through the head marker
function headTrackStep(){
  const o = GAZE.obj;
  if(!o) return;
  if(o.carried){ GAZE.obj = null; return; }
  if(sim.mode !== 'Pose') return;
  const dx = o.mesh.position.x - T.chest.x, dz = o.mesh.position.z - T.chest.z;
  const horiz = Math.hypot(dx, dz);
  if(horiz < 0.02) return;
  const yawW = Math.atan2(dx, dz);
  sim.headYawM = THREE.MathUtils.clamp(wrapA(yawW - sim.yawBody - sim.yawHead), -1.45, 1.45);
  const ty = o.mesh.position.y + o.rad*0.7;         // look at the object's crown
  const el = Math.atan2(ty - (J.neck.y + 4*V), horiz);
  const pitch = THREE.MathUtils.clamp(-el*1.25, -0.6, 0.95);
  T.head.y = J.neck.y + (5.5*V - pitch/2.6);
}
function gazeStep(dt){
  GAZE.cool = Math.max(0, GAZE.cool - dt);
  if(CLONE.on && CLONE.face.active) return;        // the camera drives the eyes
  if(!cfg.eyesAuto || sim.mode !== 'Pose') return;
  // periodic blink: a beat of closed eyes, then resume whatever gaze was held
  if(GAZE.blinking > 0){
    GAZE.blinking -= dt;
    if(GAZE.blinking <= 0) rebuildFace(GAZE.resume || 'Focus');
    return;
  }
  GAZE.nextBlink = (GAZE.nextBlink === undefined ? 3 : GAZE.nextBlink) - dt;
  if(GAZE.nextBlink <= 0){
    GAZE.nextBlink = 2.2 + Math.random()*3.5;
    GAZE.blinking = 0.13;
    GAZE.resume = cfg.eyes;
    rebuildFace('Blink');
    return;
  }
  if(GAZE.cool > 0) return;
  const want = desiredGaze();
  if(want !== cfg.eyes){
    rebuildFace(want);
    GAZE.cool = 0.15;                               // a saccade, not a flicker
  }
}

/* ---------- clone mode: two-camera mocap ----------

async function loadVision(){

async function listCams(){

      if(!sel) continue;
      const saved = pLoad('vp_' + id);
      const cur = sel.value || saved;
      sel.innerHTML = '';
      cams.forEach((c, i)=>{
        const o = document.createElement('option');
        o.value = c.deviceId;
        o.textContent = (c.label || ('camera ' + (i + 1))).slice(0, 22);

async function startCam(slot){

    if(S.video && S.video.srcObject) S.video.srcObject.getTracks().forEach(t=>t.stop());
    if(S.video) S.video.style.display = 'none';
    setCloneStatus('');
    refreshCloneChips();
    return;
  }
  try{
    const {mp, files} = await loadVision();
    const sel = document.getElementById(slot === 'face' ? 'faceSel' : 'handSel');
    const devId = sel && sel.value;
    if(devId) pStore('vp_' + (slot === 'face' ? 'faceSel' : 'handSel'), devId);
    setCloneStatus('opening camera…');
    const stream = await navigator.mediaDevices.getUserMedia({

    S.video.style.display = '';

        ? await mp.FaceLandmarker.createFromOptions(files, {
            baseOptions:{modelAssetPath: base + 'face_landmarker/face_landmarker/float16/1/face_landmarker.task', ...gpu},
            runningMode:'VIDEO', numFaces:1,
            outputFaceBlendshapes:true, outputFacialTransformationMatrixes:true})

            baseOptions:{modelAssetPath: base + 'hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', ...gpu},

    setCloneStatus(slot + ' cam live');
    refreshCloneChips();
    let flip = false;
    const loop = ()=>{
      if(!S.active) return;

}
function parseFace(res){
  const F = CLONE.face;
  const mr = CLONE.mirror ? 1 : -1;
  const m = res.facialTransformationMatrixes && res.facialTransformationMatrixes[0];
  if(m){
    _cm4.fromArray(m.data);
    _ceu.setFromRotationMatrix(_cm4, 'YXZ');

    F.pitch = THREE.MathUtils.clamp(_ceu.x, -0.55, 0.9); // reversed for webcam
  }
  const lms = res.faceLandmarks && res.faceLandmarks[0];
  if(lms && lms[152] && lms[234] && lms[454]){
    F.cx = lms[152].x;                                   // chin: torso lateral proxy
    F.prox = Math.hypot(lms[454].x - lms[234].x,         // face width: close/far proxy
                        lms[454].y - lms[234].y);
  }
  const bs = res.faceBlendshapes && res.faceBlendshapes[0];
  if(!bs) return;
  const g = {};
  for(const c of bs.categories) g[c.categoryName] = c.score;
  const lat = mr * ((g.eyeLookOutLeft + g.eyeLookInRight) - (g.eyeLookInLeft + g.eyeLookOutRight))/2;
  const vert = ((g.eyeLookUpLeft + g.eyeLookUpRight) - (g.eyeLookDownLeft + g.eyeLookDownRight))/2;
  F.eyes = gridState(lat, vert, 0.22, 0.22);
  if((g.eyeBlinkLeft + g.eyeBlinkRight)/2 > 0.5) F.eyes = 'Blink';
  const jaw = g.jawOpen, sm = (g.mouthSmileLeft + g.mouthSmileRight)/2;

function parseHands(res, src){
  const out = {L:null, R:null};

    const hands = res.landmarks.map(lm=>{
      const w = lm[0];                              // wrist
      const palm = Math.hypot(lm[9].x - w.x, lm[9].y - w.y) || 0.05;
      let curl = 0;
      for(const t of [8, 12, 16, 20])
        curl += Math.hypot(lm[t].x - w.x, lm[t].y - w.y);
      curl /= 4*palm;                               // ~2.1 open .. ~1.0 fist
      return {x:w.x, y:w.y,
        grip:THREE.MathUtils.clamp((2.1 - curl)/1.1, 0, 1),
        rot:Math.atan2(lm[17].y - lm[5].y, lm[17].x - lm[5].x)};  // knuckle-line roll
    }).sort((a, b)=>a.x - b.x);

    // unmirrored: true clone, sides swap
    const first = CLONE.mirror ? 'L' : 'R', second = CLONE.mirror ? 'R' : 'L';

  {id:'faceR', need:'face',  short:'R',     prompt:'Turn your head RIGHT'},
  {id:'faceU', need:'face',  short:'Up',    prompt:'Look UP'},
  {id:'faceD', need:'face',  short:'Down',  prompt:'Look DOWN'},
  {id:'chC',   need:'face',  short:'Sit',   prompt:'Sit NEUTRAL, facing the camera'},
  {id:'chL',   need:'face',  short:'LeanL', prompt:'Lean your body LEFT'},
  {id:'chR',   need:'face',  short:'LeanR', prompt:'Lean your body RIGHT'},

  {id:'chFar', need:'face',  short:'Far',   prompt:'Lean BACK, away from the camera'},

function runCalibration(queue){

  if(!CLONE.face.active && !CLONE.hands.active){
    setCloneStatus('start a camera first');

      const sc = document.getElementById('refScrub');
      sc.max = vid.duration || 1;
      sc.value = 0;
    }
    refAddFrame();                                  // start with one frame
    refMsg(isVid ? 'scrub, mark joints, + Frame for more keys'
                 : 'click to place the selected joint');
  };
  if(isVid){ vid.src = url; vid.onloadedmetadata = ready; }
  else { img.src = url; img.onload = ready; }
}
// ---- capture: image-space markers -> world targets -> keyframes ----
function refFrameToTargets(f, cal){
  const mk = f.marks;
  if(!mk.chest) return false;
  const [nw, nh] = refNat();
  const P = j=>({x:mk[j].x*nw, y:mk[j].y*nh});
  const c = P('chest');
  let groundY, sc;
  if(cal){                                          // shared across a video: poses keep height
    groundY = cal.groundY; sc = cal.sc;
  } else {
    const feet = ['footL','footR'].filter(j=>mk[j]);
    if(feet.length){
      groundY = feet.reduce((a, j)=>a + P(j).y, 0)/feet.length;
      sc = (groundY - c.y)/(25*V);
    } else if(mk.head){
      sc = (c.y - P('head').y)/(8*V);               // head sits ~8V above the chest
      groundY = c.y + 26*V*sc;
    } else {
      sc = nh/(40*V);
      groundY = c.y + 26*V*sc;
    }
  }
  if(!(sc > 0)) return false;
  const baseX = T.chest.x;
  for(const j of REF.jointOrder){
    if(!mk[j]) continue;
    const p = P(j);
    T[j].x = baseX + (p.x - c.x)/sc;
    T[j].y = Math.max(0.5*V, (groundY - p.y)/sc);
  }
  return true;
}
function refSharedCal(frames){
  // static-camera assumption: ground = lowest feet line anywhere in the clip;
  // scale anchored to the most upright frame (largest chest-to-ground span)
  const [nw, nh] = refNat();
  let groundY = -1, span = 0;
  for(const f of frames){
    const feet = ['footL','footR'].filter(j=>f.marks[j]);
    if(!feet.length) continue;
    const fy = feet.reduce((a, j)=>a + f.marks[j].y*nh, 0)/feet.length;
    groundY = Math.max(groundY, fy);
  }
  if(groundY < 0) return null;
  for(const f of frames)
    span = Math.max(span, groundY - f.marks.chest.y*nh);
  return span > 0 ? {groundY, sc:span/(25*V)} : null;
}
function refCapture(){
  const frames = REF.frames.filter(f=>f.marks.chest);
  if(!frames.length){ refMsg('mark the chest (red) on at least one frame'); return; }
  if(sim.mode === 'Ragdoll') setMode('Pose');
  anim.playing = false;
  anim.keys.length = 0;
  const cal = frames.length > 1 ? refSharedCal(frames) : null;
  for(const f of frames){
    refFrameToTargets(f, cal);
    snapshot();
  }
  if(frames.length > 1){
    const span = frames[frames.length - 1].t - frames[0].t;
    anim.spk = THREE.MathUtils.clamp(span/(frames.length - 1) || 0.6, 0.15, 2);
    if(typeof inpSpk !== 'undefined' && inpSpk) inpSpk.value = anim.spk;
    anim.t = 0; anim.playing = true;
    updateAnimUI();
    refMsg('captured ' + frames.length + ' keys — playing');
  } else {
    loadKey(anim.keys.length - 1);
    refMsg('pose applied + saved as a key');
  }
}
function initRefUI(){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*,video/*'; inp.style.display = 'none';
  inp.onchange = ()=>{ if(inp.files[0]) refLoad(inp.files[0]); inp.value = ''; };
  document.body.appendChild(inp);
  const row = document.getElementById('uiRef');
  const mk = (label, fn)=>{
    const b = document.createElement('button');
    b.className = 'chip'; b.textContent = label; b.onclick = fn;
    row.appendChild(b); return b;
  };
  mk('Load', ()=>inp.click());
  mk('Show', ()=>{ if(typeof showTab === 'function') showTab('tRef'); });
  const act = document.getElementById('refActions');
  const mka = (label, fn)=>{
    const b = document.createElement('button');
    b.className = 'chip'; b.textContent = label; b.onclick = fn;
    act.appendChild(b); return b;
  };
  mka('+ Frame', refAddFrame);
  mka('Clear marks', ()=>{
    const f = refFrame(); if(f){ f.marks = {}; refRenderJoints(); refDraw(); }
  });
  mka('Capture \u25B8', refCapture);
  mka('\u2715', ()=>{ if(typeof showTab === 'function') showTab('tChar'); });
  // canvas interaction: click places the selected joint; double-click removes
  const cv = document.getElementById('refCanvas');
  const toNorm = ev=>{
    const r = refRect(), b = cv.getBoundingClientRect();
    const x = (ev.clientX - b.left - r.x)/r.w, y = (ev.clientY - b.top - r.y)/r.h;
    return (x < 0 || x > 1 || y < 0 || y > 1) ? null : {x, y};
  };
  cv.addEventListener('click', ev=>{
    const f = refFrame(); if(!f) return;
    const n = toNorm(ev); if(!n) return;
    f.marks[REF.sel] = n;
    // auto-advance to the next unplaced joint
    const next = REF.jointOrder.find(j=>!f.marks[j]);
    if(next) REF.sel = next;
    refRenderJoints(); refDraw();
  });
  cv.addEventListener('dblclick', ev=>{
    const f = refFrame(); if(!f) return;
    const n = toNorm(ev); if(!n) return;
    const r = refRect();
    let bestJ = null, bestD = 16;                   // px radius
    for(const j in f.marks){
      const d = Math.hypot((f.marks[j].x - n.x)*r.w, (f.marks[j].y - n.y)*r.h);
      if(d < bestD){ bestD = d; bestJ = j; }
    }
    if(bestJ){ delete f.marks[bestJ]; REF.sel = bestJ; refRenderJoints(); refDraw(); }
  });
  // video controls
  const vid = document.getElementById('refVid');
  const scrub = document.getElementById('refScrub');
  scrub.oninput = ()=>{
    vid.currentTime = +scrub.value;
    // snap to an existing frame if one is close
    const i = REF.frames.findIndex(f=>Math.abs(f.t - vid.currentTime) < 0.05);
    if(i >= 0 && i !== REF.cur){ REF.cur = i; refRenderFrames(); refRenderJoints(); }
    refDraw();
  };
  document.getElementById('refPlay').onclick = ()=>{
    if(vid.paused) vid.play(); else vid.pause();
  };
  vid.addEventListener('timeupdate', ()=>{
    scrub.value = vid.currentTime;
    document.getElementById('refTime').textContent = vid.currentTime.toFixed(2);
    refDraw();
  });
  vid.addEventListener('seeked', refDraw);
  window.addEventListener('resize', refDraw);
  refRenderJoints();
}

/* ---------- movable panel system ----------
   Every .vp-panel drags by its head bar, collapses via the chevron, and the
   layout (positions + collapsed states) persists across sessions. */
function initPanels(){
  if(typeof document.querySelectorAll !== 'function') return;   // headless harness
  let saved = {};
  try{ saved = JSON.parse(pLoad('vp_ui') || '{}') || {}; }catch(e){}
  const panels = [...document.querySelectorAll('.vp-panel')];
  const save = ()=>{
    const o = {};
    for(const p of panels){
      const r = p.getBoundingClientRect();
      o[p.id] = {x:Math.round(r.left), y:Math.round(r.top), min:p.classList.contains('min')};
    }
    pStore('vp_ui', JSON.stringify(o));
  };
  for(const p of panels){
    const st = saved[p.id];
    if(st && st.x !== undefined && p.id !== 'refPanel'){
      p.style.left = Math.min(st.x, innerWidth - 80) + 'px';
      p.style.top = Math.min(st.y, innerHeight - 60) + 'px';
      p.style.right = 'auto'; p.style.bottom = 'auto'; p.style.transform = 'none';
    }
    if(st && st.min) p.classList.add('min');
    const head = p.querySelector('.vp-head');
    const btn = p.querySelector('.vp-collapse');
    if(btn) btn.onclick = e=>{
      e.stopPropagation();
      p.classList.toggle('min');
      btn.textContent = p.classList.contains('min') ? '+' : '\u2212';
      save();
    };
    if(btn && p.classList.contains('min')) btn.textContent = '+';
    if(!head) continue;
    let drag = false, sx = 0, sy = 0, ox = 0, oy = 0;
    head.addEventListener('pointerdown', e=>{
      if(e.target === btn) return;
      drag = true;
      p.classList.add('dragging');
      head.setPointerCapture(e.pointerId);
      const r = p.getBoundingClientRect();
      p.style.left = r.left + 'px'; p.style.top = r.top + 'px';
      p.style.right = 'auto'; p.style.bottom = 'auto'; p.style.transform = 'none';
      sx = e.clientX; sy = e.clientY; ox = r.left; oy = r.top;
    });
    head.addEventListener('pointermove', e=>{
      if(!drag) return;
      p.style.left = Math.max(4, Math.min(innerWidth - 70, ox + e.clientX - sx)) + 'px';
      p.style.top = Math.max(4, Math.min(innerHeight - 44, oy + e.clientY - sy)) + 'px';
    });
    head.addEventListener('pointerup', ()=>{
      if(!drag) return;
      drag = false;
      p.classList.remove('dragging');
      save();
    });
  }
}
initPanels();

/* ---------- single-dock: tabs, resize, mobile default ---------- */
let showTab = function(){};
function initDock(){
  if(typeof document.querySelector !== 'function') return;
  const dock = document.getElementById('dock');
  if(!dock) return;
  const tabs = [...dock.querySelectorAll('.vp-tab')];
  const panes = [...dock.querySelectorAll('.vp-pane')];
  let ds = {};
  try{ ds = JSON.parse(pLoad('vp_dock') || '{}') || {}; }catch(e){}
  const saveDock = ()=>{
    const cur = tabs.find(t=>t.classList.contains('on'));
    pStore('vp_dock', JSON.stringify({
      tab: cur ? cur.dataset.tab : 'tChar',
      w: parseInt(dock.style.width) || undefined,
      h: parseInt(dock.style.height) || undefined,
      min: dock.classList.contains('min')
    }));
  };
  showTab = function(id){
    tabs.forEach(t=> t.classList.toggle('on', t.dataset.tab === id));
    panes.forEach(p=> p.classList.toggle('on', p.id === id));
    if(dock.classList.contains('min')){            // un-minimise when a tab is chosen
      dock.classList.remove('min');
      const cb = dock.querySelector('.vp-collapse');
      if(cb) cb.textContent = '\u2212';
    }
    saveDock();
  };
  tabs.forEach(t=> t.addEventListener('click', ()=> showTab(t.dataset.tab)));

  // restore size + active tab; default-minimise on mobile
  if(ds.w) dock.style.width = Math.min(ds.w, innerWidth - 20) + 'px';
  if(ds.h){ dock.style.height = Math.min(ds.h, innerHeight - 20) + 'px'; dock.style.maxHeight = 'none'; }
  showTab(ds.tab && panes.some(p=>p.id===ds.tab) ? ds.tab : 'tChar');
  const wantMin = ds.min !== undefined ? ds.min : IS_MOBILE;   // phones start collapsed
  if(wantMin){
    dock.classList.add('min');
    const cb = dock.querySelector('.vp-collapse');
    if(cb) cb.textContent = '+';
  }

  // corner resize
  const rz = document.getElementById('dockResize');
  if(rz){
    let rzOn = false, rx = 0, ry = 0, rw = 0, rh = 0;
    rz.addEventListener('pointerdown', e=>{
      rzOn = true; rz.setPointerCapture(e.pointerId);
      const r = dock.getBoundingClientRect();
      rx = e.clientX; ry = e.clientY; rw = r.width; rh = r.height;
      dock.style.maxHeight = 'none';
      e.preventDefault(); e.stopPropagation();
    });
    rz.addEventListener('pointermove', e=>{
      if(!rzOn) return;
      dock.style.width  = Math.max(170, Math.min(innerWidth - 24,  rw + e.clientX - rx)) + 'px';
      dock.style.height = Math.max(120, Math.min(innerHeight - 24, rh + e.clientY - ry)) + 'px';
    });
    rz.addEventListener('pointerup', ()=>{ if(rzOn){ rzOn = false; saveDock(); } });
  }
  // keep collapse button persisting dock state too
  const cb = dock.querySelector('.vp-collapse');
  if(cb){ const prev = cb.onclick; cb.addEventListener('click', ()=> setTimeout(saveDock, 0)); }
}
initDock();
if(typeof renderer !== 'undefined' && renderer.domElement && renderer.domElement.addEventListener)

function cloneStep(dt){
  const e = Math.min(1, 12*dt);
  const mr = CLONE.mirror ? 1 : -1;
  // ---- chest lean (lateral + close/far), applied as a tracked offset so it
  // can never drift, and drained back to zero when tracking stops ----
  {
    let wx = 0, wz = 0;
    const MC = CLONE.on && CLONE.face.active && CAL.map && CAL.map.chest ? CAL.map.chest : null;
    if(MC){
      _yq.setFromAxisAngle(UP, sim.yawBody);
      fwdYaw(_fw);
      const latC = dzone(calNrm(CLONE.face.cx, MC.cx.c, MC.cx.l, MC.cx.r), 0.14)*0.3*mr;
      const fwdC = dzone(calNrm(CLONE.face.prox, MC.px.c, MC.px.near, MC.px.far), 0.14)*0.26;
      const rtx = _fw.z, rtz = -_fw.x;
      wx = rtx*latC + _fw.x*fwdC;
      wz = rtz*latC + _fw.z*fwdC;
    }
    const A = CLONE.app;
    if(MC || Math.abs(A.x) > 1e-5 || Math.abs(A.z) > 1e-5){
      const k = Math.min(1, 8*dt);
      const nx = A.x + (wx - A.x)*k, nz = A.z + (wz - A.z)*k;
      const dx = nx - A.x, dz2 = nz - A.z;
      A.x = nx; A.z = nz;
      T.chest.x += dx; T.chest.z += dz2;
      for(const g of CHEST_GROUP){ T[g].x += dx; T[g].z += dz2; }
    }
  }
  if(!CLONE.on) return;
  if(CLONE.face.active){
    const M = CAL.map;
    let yw = -CLONE.face.yaw*mr, pt = CLONE.face.pitch;
    if(M && M.yaw && M.yaw.l !== undefined)
      yw = dzone(calNrm(CLONE.face.yaw, M.yaw.c, M.yaw.l, M.yaw.r), 0.12)*1.1*mr;
    if(M && M.pitch && M.pitch.d !== undefined)
      pt = dzone(calNrm(CLONE.face.pitch, M.pitch.c, M.pitch.d, M.pitch.u), 0.12)*0.6;
    // slew limit: a one-frame tracking spike can't snap the head sideways
    let dy = (yw - sim.yawHead)*e;
    sim.yawHead += THREE.MathUtils.clamp(dy, -3.5*dt, 3.5*dt);
    const hy = J.neck.y + (5.5*V - pt/2.6);
    let dh = (hy - T.head.y)*e;
    T.head.y += THREE.MathUtils.clamp(dh, -0.6*dt, 0.6*dt);
    if(GAZE.cool <= 0 && CLONE.face.eyes !== cfg.eyes){
      rebuildFace(CLONE.face.eyes);
      GAZE.cool = 0.12;
    }
    CLONE.mCool -= dt;
    const fm = CLONE.face.mouth;
    if(fm && CLONE.mCool <= 0 &&
       (cfg.mouth !== fm.state || (fm.state === 'Talk' && fm.vis !== VIS.cur))){
      cfg.mouth = fm.state;
      if(fm.vis) VIS.cur = fm.vis;
      refaceHead();
      CLONE.mCool = 0.1;
    }
  }
  if((CLONE.hands.active || CLONE.face.active) && !drag && !LOCO.active && ACT.kind === 'none'){
    _yq.setFromAxisAngle(UP, sim.yawBody);
    fwdYaw(_fw);
    for(const S of ['L','R']){
      const d = CLONE.h.down[S], b = CLONE.h.bust[S];
      if(!d && !b) continue;
      const Mh = CAL.map && CAL.map.h && CAL.map.h[S];
      let lat, fwd, ht;
      if(Mh){
        // personal mapping from calibration: your ranges -> his ranges
        const x = (d || b).x;
        lat = ((S === 'L' ? -0.34 : 0.34) +
               THREE.MathUtils.clamp((x - Mh.cx)/Mh.spanX, -1.5, 1.5)*0.62*mr) * HSIDE;
        fwd = d ? 0.38 + THREE.MathUtils.clamp((d.y - Mh.cy)/((Mh.fy - Mh.cy) || -0.25), -0.3, 1.5)*0.6
                : 0.5;
        ht = b ? T.chest.y - 8*V +
                 THREE.MathUtils.clamp((b.y - Mh.by)/((Mh.uy - Mh.by) || -0.4), -0.4, 1.5)*0.95
               : T.chest.y - 6*V + (Mh.cy - (d ? d.y : Mh.cy))*0.5;
        // wrist rotation: knuckle-line roll relative to your calibrated rest
        const rsrc = d && d.rot !== undefined ? d : b;
        if(Mh.rot0 !== undefined && rsrc && rsrc.rot !== undefined){
          let dr = rsrc.rot - Mh.rot0;
          while(dr >  Math.PI) dr -= Math.PI*2;
          while(dr < -Math.PI) dr += Math.PI*2;
          const tw = THREE.MathUtils.clamp(-dr*mr, -2, 2);
          HAND[S].twist += (tw - HAND[S].twist)*e;
        }
      } else {
        // fuse the cameras: down cam owns lateral + reach, bust cam owns height;
        // either alone still works with sensible defaults
        lat = (((d || b).x) - 0.5) * 1.9 * HSIDE * mr;
        fwd = d ? (0.75 - d.y)*1.2 + 0.45 : 0.5;     // starts well out in front
        ht  = b ? T.chest.y + (0.45 - b.y)*1.4
                : T.chest.y - 6*V + (0.6 - d.y)*0.5;
      }
      t4.set(lat, 0, 0).applyQuaternion(_yq);
      t1.copy(T.chest).add(t4).addScaledVector(_fw, fwd);
      t1.y = THREE.MathUtils.clamp(ht, 4*V, T.chest.y + 14*V);
      T['hand'+S].lerp(t1, e);
      const g = (d || b).grip;
      HAND[S].grip += (g - HAND[S].grip)*e;
    }
  }
}

/* ---------- locomotion (WASD + Space + Shift/C) ----------
   Procedural gait written into the same pose targets on the fixed-step loop:
   camera-relative movement, body turns toward heading, alternating stride
   with lift arcs, counter-swinging arms, crouch height blend, and a real
   ballistic jump that hands its landing velocity to the knee spring. */
function locoInput(){
  let x = 0, z = 0;
  if(NAV.on){
    LDIR.x = NAV.x - T.chest.x; LDIR.z = NAV.z - T.chest.z;
    const l = Math.hypot(LDIR.x, LDIR.z);
    if(l < NAV.r){ NAV.on = false; return false; }
    LDIR.x /= l; LDIR.z /= l;
    return true;
  }
  if(KEYS.has('w')) z += 1;
  if(KEYS.has('s')) z -= 1;
  if(KEYS.has('a')) x -= 1;
  if(KEYS.has('d')) x += 1;
  if(!x && !z) return false;
  const fx = -Math.sin(orbit.theta), fz = -Math.cos(orbit.theta);  // camera fwd
  const rx = -fz, rz = fx;                                          // camera right
  LDIR.x = fx*z + rx*x;
  LDIR.z = fz*z + rz*x;
  const l = Math.hypot(LDIR.x, LDIR.z) || 1;
  LDIR.x /= l; LDIR.z /= l;
  return true;
}
function locoStep(dt){
  const standY = 26*V, crouchY = 18*V;
  const crouch = KEYS.has('c');
  const running = KEYS.has('shift');
  const hasMove = locoInput();
  const wantJump = KEYS.has(' ');
  if(!LOCO.active){
    if(!hasMove && !crouch && !wantJump) return;
    LOCO.active = true;
    LOCO.phase = 0; LOCO.vy = 0; LOCO.air = false; LOCO.speed = 0;
    FALL.vy = 0; FALL.spring = false;
    DGL.L.on = DGL.R.on = false;
    STEP.L.on = STEP.R.on = false;
  }
  // heading: turn toward input
  let sp = 0;
  if(hasMove){
    const target = Math.atan2(LDIR.x, LDIR.z);
    let dyaw = target - sim.yawBody;
    while(dyaw >  Math.PI) dyaw -= Math.PI*2;
    while(dyaw < -Math.PI) dyaw += Math.PI*2;
    sim.yawBody += THREE.MathUtils.clamp(dyaw, -11*dt, 11*dt);
    sp = (crouch ? 0.22 : running ? 0.72 : 0.38) * (LOCO.air ? 0.85 : 1);
  }
  LOCO.speed += (sp - LOCO.speed)*Math.min(1, 8*dt);
  if(LOCO.speed > 0.01 && hasMove){
    const dx = LDIR.x*LOCO.speed*dt, dz = LDIR.z*LOCO.speed*dt;
    T.chest.x += dx; T.chest.z += dz;
    for(const g of CHEST_GROUP){ T[g].x += dx; T[g].z += dz; }
  }
  // ---- jump: a state machine, not an impulse ----
  // standing: anticipation crouch (arms swing back) -> two-foot launch
  // moving:   push off the planted foot, scissor in the air, land on the lead
  const jumpEdge = wantJump && !LOCO.jprev;
  LOCO.jprev = wantJump;
  if(jumpEdge && !LOCO.air && LOCO.jst === 'none' && !FALL.spring){
    endAct();
    if(LOCO.speed < 0.12){
      LOCO.jst = 'antic'; LOCO.jt = 0;
      LOCO.jv = 1.7 + Math.random()*0.3;            // every jump a little different
      LOCO.jstag = (Math.random() - 0.5)*1.2*V;     // foot stagger
    } else {
      // the swinging (higher) foot becomes the lead; the planted one pushes
      LOCO.jlead = T.footL.y > T.footR.y ? 'L' : 'R';
      LOCO.jtype = 'run';
      LOCO.air = true;
      LOCO.vy = 1.6 + 0.2*LOCO.speed;
      LOCO.jst = 'none';
    }
  }
  if(LOCO.jst === 'antic'){
    LOCO.jt += dt;
    T.chest.x += _fw.x*1.2*V*dt/0.18;               // weight rocks forward
    T.chest.z += _fw.z*1.2*V*dt/0.18;
    if(LOCO.jt >= 0.18){
      LOCO.jst = 'none';
      LOCO.jtype = 'stand';
      LOCO.air = true;
      LOCO.vy = LOCO.jv;
    }
  }
  let dyv = 0;
  if(LOCO.air){
    LOCO.vy -= 9.8*dt;
    dyv = LOCO.vy*dt;
    if(LOCO.vy < 0 && T.chest.y + dyv <= standY){
      LOCO.air = false;
      FALL.spring = true;
      FALL.vy = LOCO.vy;                            // physics hand-off to knee spring
      FALL.noSquare = true;
      dyv = standY - T.chest.y;
      if(LOCO.jtype === 'run'){
        // touch down on the lead foot where it was reaching; the trail
        // foot takes a catch-step up beside it a beat later
        const lead = LOCO.jlead, trail = lead === 'L' ? 'R' : 'L';
        T['foot'+lead].y = 2*V;
        const st = STEP[trail];
        st.on = true; st.t = -0.35;                 // the delay reads as a catch
        st.from.copy(T['foot'+trail]);
        stanceSlot(trail, t1);
        st.to.copy(t1).addScaledVector(_fw, -1.5*V);
        // re-sync the gait so the planted lead carries the next stride
        LOCO.phase = LOCO.jlead === 'L' ? 1.9 : 1.9 - Math.PI;
      }
    }
    T.chest.y += dyv;
    LAG.h += dyv; LAG.a += dyv;                     // follow-through in the air too
    releaseLag(dt);
  } else if(!FALL.spring){
    const nat = sim.gait === 'Natural';
    const bob = LOCO.speed > 0.05
      ? (nat ? -Math.pow(Math.abs(Math.sin(LOCO.phase)), 1.3)*0.75*V
             : -Math.abs(Math.sin(LOCO.phase))*0.5*V)
      : 0;
    const hT = (LOCO.jst === 'antic' ? 20.5*V
              : (crouch ? crouchY : standY)) + bob;
    dyv = (hT - T.chest.y)*Math.min(1, 10*dt);
    T.chest.y += dyv;
    T.head.y += dyv;
    T.handL.y += dyv; T.handR.y += dyv;
    T.elbowL.y += dyv; T.elbowR.y += dyv;
  }
  // gait
  const nat = sim.gait === 'Natural';
  const spdF = Math.min(1, LOCO.speed/0.4);
  if(LOCO.speed > 0.05 && !LOCO.air){
    const flutter = nat ? 1 + 0.05*Math.sin(LOCO.phase*0.31 + 1.7) : 1;
    LOCO.phase += dt*(4.2 + 9*LOCO.speed)*flutter;
  }
  _yq.setFromAxisAngle(UP, sim.yawBody);
  fwdYaw(_fw);
  const rtx = _fw.z, rtz = -_fw.x;                  // body right
  // lateral weight shift over the planted foot (applied as diffs: no drift)
  const swayA = nat && !LOCO.air ? 0.8*V*spdF : 0;
  const sx = rtx*Math.cos(LOCO.phase)*swayA;
  const sz = rtz*Math.cos(LOCO.phase)*swayA;
  const ddx = sx - LOCO.swx, ddz = sz - LOCO.swz;
  LOCO.swx = sx; LOCO.swz = sz;
  if(ddx || ddz){
    T.chest.x += ddx; T.chest.z += ddz;
    for(const g of CHEST_GROUP){ T[g].x += ddx; T[g].z += ddz; }
  }
  // feet trail the chest when leaning into the walk -> the spine tilts forward
  const lean = nat ? 1.7*V*Math.min(1.5, LOCO.speed/0.4) : 0;
  const ax = T.chest.x - _fw.x*lean - LOCO.swx;     // gait anchor (sway-free)
  const az = T.chest.z - _fw.z*lean - LOCO.swz;
  const stride = 4.5*V*Math.min(1.45, LOCO.speed/1.5);
  const liftH = 3*V*Math.min(1.35, Math.max(LOCO.speed, LOCO.speed/1.5));
  const tuck = THREE.MathUtils.clamp((T.chest.y - standY)*0.7, 0, 4.5*V);
  for(const S of ['L','R']){
    const p = LOCO.phase + (S === 'L' ? 0 : Math.PI);
    const foot = T['foot'+S], knee = T['knee'+S];
    t4.set(S === 'L' ? -DIM.hipx*1.15 : DIM.hipx*1.15, 0, 0).applyQuaternion(_yq);
    if(LOCO.air){
      if(LOCO.jtype === 'run'){
        // scissor: lead leg drives forward (knee high on the way up, reaching
        // down to catch on the way down); the push leg trails behind
        const asc = LOCO.vy > 0;
        const isLead = S === LOCO.jlead;
        const jw = 0.75 + 0.25*LOCO.speed;          // run stretches the scissor
        const fOff = (isLead ? (asc ? 3.5 : 4.5)*V : -3.5*V)*jw;
        const yOff = isLead ? (asc ? T.chest.y - 18*V : Math.max(2*V, T.chest.y - 23*V))
                            : T.chest.y - 20*V;
        foot.set(
          T.chest.x + t4.x + _fw.x*fOff,
          Math.max(2*V, yOff),
          T.chest.z + t4.z + _fw.z*fOff
        );
      } else {
        const asc = LOCO.vy > 0;
        const stag = (S === 'L' ? 1 : -1)*LOCO.jstag*0.5;
        foot.set(
          T.chest.x + t4.x + _fw.x*1*V,
          Math.max(2*V, T.chest.y - 10*V - (13.3*V - (asc ? tuck : tuck*0.45)) + stag),
          T.chest.z + t4.z + _fw.z*1*V
        );
      }
    } else if(LOCO.speed > 0.05){
      foot.set(
        ax + t4.x + _fw.x*Math.sin(p)*stride,
        2*V + Math.max(0, Math.cos(p))*liftH,
        az + t4.z + _fw.z*Math.sin(p)*stride
      );
    } else {
      stanceSlot(S, t1);
      foot.lerp(t1, Math.min(1, 10*dt));
    }
    t3.set(ax + t4.x, T.chest.y - 10*V, az + t4.z);
    knee.copy(t3).lerp(foot, 0.5).addScaledVector(_fw, 0.3);
  }
  // arms + head through the jump phases (matches the reference sheets:
  // anticipation swings the arms back, launch throws them up, a moving jump
  // scissors them, and the landing brings them forward for balance)
  if(LOCO.jst === 'antic'){
    for(const S of ['L','R']){
      t4.set(S === 'L' ? -DIM.shx*1.05 : DIM.shx*1.05, -7*V, 0).applyQuaternion(_yq);
      t1.set(T.chest.x + t4.x, T.chest.y + t4.y, T.chest.z + t4.z)
        .addScaledVector(_fw, -4.5*V);              // swept behind
      T['hand'+S].lerp(t1, Math.min(1, 16*dt));
      t1.addScaledVector(_fw, -2*V); t1.y += 5*V;
      T['elbow'+S].lerp(t1, Math.min(1, 16*dt));
    }
    t4.set(0, 6.6*V, 1*V).applyQuaternion(_yq);
    t1.set(T.chest.x + t4.x, T.chest.y + t4.y, T.chest.z + t4.z)
      .addScaledVector(_fw, 1.6*V);                 // head dips into the crouch
    T.head.lerp(t1, Math.min(1, 14*dt));
  } else if(LOCO.air){
    const asc = LOCO.vy > 0;
    for(const S of ['L','R']){
      const sgn = S === 'L' ? -1 : 1;
      t4.set(sgn*DIM.shx*1.05, 0, 0).applyQuaternion(_yq);
      if(LOCO.jtype === 'run'){
        // arm opposite the lead leg drives forward
        const fwd = (S === LOCO.jlead ? -3.5 : 4)*V;
        t1.set(T.chest.x + t4.x + sgn*1*V, T.chest.y - 5*V, T.chest.z + t4.z)
          .addScaledVector(_fw, fwd);
      } else if(asc){
        // thrown up and slightly out
        t1.set(T.chest.x + t4.x + sgn*2.5*V, T.chest.y + 9*V, T.chest.z + t4.z)
          .addScaledVector(_fw, 1.5*V + (S==='L' ? LOCO.jstag : -LOCO.jstag));
      } else {
        // coming down: out to the sides, a touch forward, ready to balance
        t1.set(T.chest.x + t4.x + sgn*3*V, T.chest.y - 4*V, T.chest.z + t4.z)
          .addScaledVector(_fw, 2.5*V);
      }
      T['hand'+S].lerp(t1, Math.min(1, 9*dt));
    }
    t4.set(0, 7.5*V, 1*V).applyQuaternion(_yq);
    t1.set(T.chest.x + t4.x, T.chest.y + t4.y, T.chest.z + t4.z)
      .addScaledVector(_fw, LOCO.jtype === 'run' ? 2.2*V : (asc ? 0.6 : 1.4)*V);
    T.head.lerp(t1, Math.min(1, 8*dt));
  } else if(FALL.spring && LOCO.speed < 0.3){
    // absorbing a landing: arms forward and low, bending into it
    const w = Math.min(1, Math.abs(FALL.vy)*0.6 + 0.3);
    for(const S of ['L','R']){
      t4.set(S === 'L' ? -DIM.shx : DIM.shx, -6*V, 0).applyQuaternion(_yq);
      t1.set(T.chest.x + t4.x, T.chest.y + t4.y, T.chest.z + t4.z)
        .addScaledVector(_fw, 4*V*w);
      T['hand'+S].lerp(t1, Math.min(1, 10*dt));
    }
  }
  // arms counter-swing + head settles forward while walking
  if(!LOCO.air && LOCO.speed > 0.05){
    for(const S of ['L','R']){
      const p = LOCO.phase + (S === 'L' ? Math.PI : 0);
      const amp = (nat ? (S === 'L' ? 3.3 : 2.8)*V : 3*V)*Math.min(1.6, LOCO.speed/1.5);
      t4.set(S === 'L' ? -DIM.shx*1.05 : DIM.shx*1.05, -9*V, 0).applyQuaternion(_yq);
      t1.set(T.chest.x + t4.x, T.chest.y + t4.y, T.chest.z + t4.z)
        .addScaledVector(_fw, Math.sin(p)*amp);
      T['hand'+S].lerp(t1, Math.min(1, 12*dt));
      t1.addScaledVector(_fw, -6*V); t1.y += 6*V;
      T['elbow'+S].lerp(t1, Math.min(1, 12*dt));
    }
    t4.set(0, 7.5*V, 1*V).applyQuaternion(_yq);
    t1.set(T.chest.x + t4.x, T.chest.y + t4.y, T.chest.z + t4.z);
    if(nat){
      // head bobs at step frequency (phase-lagged), sways with the weight
      // shift, and drifts a touch of yaw -> reads alive instead of welded on
      t1.y += Math.sin(2*LOCO.phase + 0.6)*0.45*V;
      t1.x += rtx*Math.cos(LOCO.phase - 0.5)*0.35*V;
      t1.z += rtz*Math.cos(LOCO.phase - 0.5)*0.35*V;
      t1.addScaledVector(_fw, 0.8*V);                // chin slightly ahead: lean
      sim.headYawM += (0.06*Math.sin(LOCO.phase*0.5) - sim.headYawM)*Math.min(1, 6*dt);
    } else {
      sim.headYawM += (0 - sim.headYawM)*Math.min(1, 6*dt);   // look ahead
    }
    T.head.lerp(t1, Math.min(1, 10*dt));
  }
  // fully idle -> hand control back
  if(!hasMove && !crouch && !LOCO.air && !FALL.spring && LOCO.jst === 'none' &&
     Math.abs(T.chest.y - standY) < 0.2*V && LOCO.speed < 0.02){
    LOCO.active = false;
    squareStance();
  }
}
addEventListener('keydown', e=>{
  if(e.key === 'o' || e.key === 'O'){ POST.on = !POST.on; slog('system', 'post-fx', POST.on ? 'on' : 'off'); }
  if(e.target && e.target.tagName === 'INPUT') return;
  const map = {arrowup:'w', arrowdown:'s', arrowleft:'a', arrowright:'d'};
  const k = e.key.toLowerCase();
  const key = map[k] || k;
  const ACTKEYS = {f:'sword', g:'axe', p:'shoot', b:'bow', n:'knife',
                   j:'ride', k:'ski', l:'board', y:'bend', u:'lie', i:'pickup'};
  if(ACTKEYS[key]){
    e.preventDefault();
    startAct(ACTKEYS[key]);
    return;
  }
  if(!['w','a','s','d',' ','shift','c'].includes(key)) return;
  e.preventDefault();
  KEYS.add(key);
  if(sim.mode === 'Ragdoll') setMode('Pose');
  if(anim.playing){ anim.playing = false; updateAnimUI(); }
});
addEventListener('keyup', e=>{
  const map = {arrowup:'w', arrowdown:'s', arrowleft:'a', arrowright:'d'};
  const k = e.key.toLowerCase();
  KEYS.delete(map[k] || k);
});
addEventListener('blur', ()=>KEYS.clear());

/* ---------- weapon actions as editable keyframe clips ----------
   Sword (F) and Axe (G) are clips: arrays of keyframes in the SAME format
   as the animation editor, stored relative to a reference frame (key 0's
   chest position + body yaw). Playback re-anchors them wherever the
   character stands and faces. "Edit" materializes a clip into the normal
   keyframe editor (drag targets, onion skins, retime with s/key), and
   Save converts the edited keys back into the relative clip. While moving,
   clips drive only the upper body so they compose with the gait. */
function setYawOff(v){
  const d = v - ACT.pyaw;
  if(d){ sim.yawBody += d; ACT.pyaw = v; }
}
function setDip(v){
  const d = v - ACT.pdip;
  if(!d) return;
  ACT.pdip = v;
  T.chest.y += d; T.head.y += d;
  T.handL.y += d; T.handR.y += d;
  T.elbowL.y += d; T.elbowR.y += d;
}
function stKey(ov, yaw, gripR, fy){
  const k = {yawBody:yaw || 0, yawHead:0, hy:0, t:{}, fy:fy ? [...fy] : [0,0],
             hand:{L:{t:0, g:0.12}, R:{t:0, g:gripR === undefined ? 0.95 : gripR}}};
  for(const n in POSES.Stand) k.t[n] = POSES.Stand[n].map(v=>v*V);
  for(const n in ov) k.t[n] = ov[n].map(v=>v*V);
  return k;
}

      let da = a - drag.last;
      if(da >  Math.PI) da -= Math.PI*2;
      if(da < -Math.PI) da += Math.PI*2;
      da = THREE.MathUtils.clamp(da, -0.25, 0.25);
      HAND[drag.twist].twist = THREE.MathUtils.clamp(HAND[drag.twist].twist + da, -2.3, 2.3);
      drag.last = a;
    }
  } else if(drag && drag.grip){                     // grip: fingertip distance from knuckle
    setNDC(e);
    ray.setFromCamera(ndc, camera);
    if(ray.ray.intersectPlane(dragPlane, hitPoint)){
      const d = hitPoint.distanceTo(parts['finP'+drag.grip].position);
      HAND[drag.grip].grip = THREE.MathUtils.clamp((2*V - d)/(1.4*V), 0, 1);
    }
  } else if(drag && drag.pin){                      // ragdoll grab
    setNDC(e);
    ray.setFromCamera(ndc, camera);
    if(ray.ray.intersectPlane(dragPlane, hitPoint)){
      hitPoint.y = Math.max(hitPoint.y, 0.06);
      drag.point.copy(hitPoint);
    }
  } else if(drag){                                  // pose targets
    setNDC(e);
    ray.setFromCamera(ndc, camera);
    if(ray.ray.intersectPlane(dragPlane, hitPoint)){
      const k = drag.key;
      hitPoint.add(drag.off);
      if(k === 'chest'){
        hitPoint.y = THREE.MathUtils.clamp(hitPoint.y, 9*V, 70*V);
        drag.dirY = (drag.dirY || 0)*0.7 + (hitPoint.y - T.chest.y)*0.3;  // lift vs lower intent
        t1.subVectors(hitPoint, T.chest);
        T.chest.copy(hitPoint);
        for(const g of CHEST_GROUP) T[g].add(t1);   // upper body rides along
      } else if(k === 'head'){
        // sweep around the neck axis -> yaw delta (wrap-free at any camera angle)
        const nx = J.neck.x, nz = J.neck.z;
        const a0 = Math.atan2(T.head.x - nx, T.head.z - nz);
        const a1 = Math.atan2(hitPoint.x - nx, hitPoint.z - nz);
        const r0 = Math.hypot(T.head.x - nx, T.head.z - nz);
        const r1 = Math.hypot(hitPoint.x - nx, hitPoint.z - nz);
        if(r0 > 0.4*V && r1 > 0.4*V){
          let da = a1 - a0;
          if(da >  Math.PI) da -= Math.PI*2;
          if(da < -Math.PI) da += Math.PI*2;
          const w = Math.min(1, (r0 + r1)*0.5/(2.5*V));   // gentle near the axis
          sim.headYawM = THREE.MathUtils.clamp(sim.headYawM + da*w, -1.45, 1.45);
        }
        T.head.copy(hitPoint);
      } else if(k === 'footL' || k === 'footR'){
        hitPoint.y = Math.max(hitPoint.y, 1.6*V);
        const hip = k === 'footL' ? J.hipL : J.hipR;
        t2.subVectors(hitPoint, hip);
        const md = DIM.legU + DIM.legF + 5*V;       // posed reach margin < dangle threshold
        if(t2.length() > md) hitPoint.copy(hip).addScaledVector(t2.normalize(), md);
        T[k].copy(hitPoint);
      } else {
        T[k].copy(hitPoint);
      }
    }
  } else if(prev.btn === 2 || e.shiftKey){          // pan
    t1.setFromMatrixColumn(camera.matrix, 0).multiplyScalar(-dx*0.0016*orbit.radius);
    t2.setFromMatrixColumn(camera.matrix, 1).multiplyScalar( dy*0.0016*orbit.radius);
    orbit.target.add(t1).add(t2);
    orbit.target.y = THREE.MathUtils.clamp(orbit.target.y, 0.2, 3);
    applyCamera();
  } else {                                          // orbit
    orbit.theta -= dx*0.0055;
    orbit.phi = THREE.MathUtils.clamp(orbit.phi - dy*0.0055, 0.18, 1.52);
    applyCamera();
  }
});

function endPointer(e){
  pointers.delete(e.pointerId);
  if(pointers.size < 2) pinchDist = 0;
  if(drag && pointers.size === 0){
    // released mid-lift below standing height -> spring him up to a full stand;
    // releases while lowering leave the pose alone (deliberate crouches persist)
    if(drag.key === 'chest' && sim.mode === 'Pose' &&
       T.chest.y < 26*V && T.chest.y > 14*V && (drag.dirY || 0) > 0.003){
      FALL.spring = true;
      FALL.vy = 0.6;
      FALL.noSquare = true;                         // his stance is where he walked to
    }
    drag = null;
    renderer.domElement.style.cursor = hovered ? 'grab' : '';
  }
}
renderer.domElement.addEventListener('pointerup', endPointer);
renderer.domElement.addEventListener('pointercancel', endPointer);
renderer.domElement.addEventListener('contextmenu', e=>e.preventDefault());
renderer.domElement.addEventListener('wheel', e=>{
  e.preventDefault();
  orbit.radius = THREE.MathUtils.clamp(orbit.radius * Math.exp(e.deltaY*0.0011), 0.5, 90);
  applyCamera();
}, {passive:false});

/* ==================== AVATAR INSTANCES ====================
   Save the full character (look + part edits + gear transforms + gender) under
   a name, then load any saved variation back. Persisted in localStorage. */
const AVATARS = { list: [] };
function avatarsLoad(){
  try{ AVATARS.list = JSON.parse(pLoad('vp_avatars') || '[]') || []; }catch(e){ AVATARS.list = []; }
}
function avatarsSave(){ pStore('vp_avatars', JSON.stringify(AVATARS.list)); }
function captureAvatar(name){
  return {
    name: name || 'Avatar',
    gender: cfg.body,                       // 'Masc' / 'Fem'
    cfg: JSON.parse(JSON.stringify(cfg)),
    edit: JSON.parse(JSON.stringify(EDIT)),
    gear: JSON.parse(JSON.stringify(GEAR_EDIT)),
    ts: Date.now(),
  };
}
function saveAvatar(name){
  avatarsLoad();
  const snap = captureAvatar(name);
  const i = AVATARS.list.findIndex(a=>a.name.toLowerCase() === snap.name.toLowerCase());
  if(i >= 0) AVATARS.list[i] = snap; else AVATARS.list.push(snap);
  avatarsSave();
  if(typeof buildInstanceList === 'function') buildInstanceList();
}
function applyAvatar(a){
  if(!a) return;
  // restore look
  Object.assign(cfg, a.cfg);
  if(a.gender) cfg.body = a.gender;
  // restore part edits (merge over defaults so new fields survive old saves)
  for(const g in EDIT){
    if(a.edit && a.edit[g]) Object.assign(EDIT[g], a.edit[g]);
  }
  // restore gear transforms
  if(a.gear) for(const k in GEAR_EDIT){
    if(a.gear[k]){
      if(typeof a.gear[k] === 'object') Object.assign(GEAR_EDIT[k], a.gear[k]);
      else GEAR_EDIT[k].s = a.gear[k];   // tolerate the old scalar format
    }
  }
  if(typeof refresh === 'function') refresh();
  applyEdits();                           // rebuilds + reposes + gear
  if(typeof buildPartsEditor === 'function') buildPartsEditor();   // sync all sliders
}
function deleteAvatar(name){
  avatarsLoad();
  AVATARS.list = AVATARS.list.filter(a=>a.name !== name);
  avatarsSave();
  if(typeof buildInstanceList === 'function') buildInstanceList();
}
avatarsLoad();

function upRes(map, f, organic){
  // every author voxel becomes an f^3 block: jittered shading + corner erosion
  const M = new Map();
  const H = (x,y,z)=>{ let h = (x*374761393 + y*668265263 + z*2147483647) ^ 0x5bf03635;
                       h = (h ^ (h >> 13)) * 1274126177; return ((h ^ (h >> 16)) >>> 0)/4294967296; };
  const occ = new Set();
  for(const k of map.keys()) occ.add(k);
  for(const [k, hex] of map){
    const p = k.split(','), x = +p[0], y = +p[1], z = +p[2];
    const nb = (dx,dy,dz)=>occ.has((x+dx)+','+(y+dy)+','+(z+dz));
    for(let i=0;i<f;i++) for(let j=0;j<f;j++) for(let l=0;l<f;l++){
      if(organic){
        // shave exposed corners for rounded silhouettes
        const ex = (i===0 && !nb(-1,0,0)) || (i===f-1 && !nb(1,0,0));
        const ey = (j===0 && !nb(0,-1,0)) || (j===f-1 && !nb(0,1,0));
        const ez = (l===0 && !nb(0,0,-1)) || (l===f-1 && !nb(0,0,1));
        if(ex && ey && ez) continue;
        if(((ex&&ey)||(ey&&ez)||(ex&&ez)) && H(x*f+i, y*f+j, z*f+l) < 0.45) continue;
      }
      const t = 0.955 + H(x*f+i+7, y*f+j+3, z*f+l+11)*0.09;
      const r = Math.min(255, (parseInt(hex.slice(1,3),16)*t)|0);
      const g = Math.min(255, (parseInt(hex.slice(3,5),16)*t)|0);
      const b = Math.min(255, (parseInt(hex.slice(5,7),16)*t)|0);
      M.set((x*f+i)+','+(y*f+j)+','+(z*f+l),
            '#' + ((1<<24) + (r<<16) + (g<<8) + b).toString(16).slice(1));
    }
  }
  return M;
}

function onLand(x, z, m){
  const pad = m || 0.3;
  const [bi, sd] = nearestIsle(x, z);
  if(sd >= pad) return [x, z];
  if(bi === 0){
    const th = Math.atan2(z, x), r = ISLE.rAt(th) - pad;
    return [Math.cos(th)*r, Math.sin(th)*r];
  }
  const sat = SATS[bi-1];
  const th = Math.atan2(z - sat.cz, x - sat.cx);
  const r = satRAt(sat, th - sat.rot) - pad;
  return [sat.cx + Math.cos(th)*r, sat.cz + Math.sin(th)*r];
}

function treeVox(wx, wz, seed, species){

  const g = new THREE.Group();

      const d = Math.hypot(x, y*(squash || 1.25), z);
      if(d > r - H(cx+x, cy+y, cz+z)*0.9) continue;
      const t = (y + R)/(2*R);                       // light from above
      const c = shades[Math.min(shades.length - 1, (t*shades.length + H(x, y, z)*0.8)|0)];
      vox(M, cx+x, cy+y, cz+z, c);
    }
