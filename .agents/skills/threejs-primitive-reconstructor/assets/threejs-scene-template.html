<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Three.js primitive reconstruction</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #2299e8;
  }
  canvas { display: block; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/*
Analysis inventory

1. Camera and framing
   - Replace with projection, camera, azimuth/elevation, and crop notes.
2. Palette
   - Replace with 8-15 colors sampled or inferred from the reference.
3. Ground / podium
   - Replace with grid size, tile variation, base thickness, paths, and water.
4. Structures
   - Replace with each structure's position, size, color, roof, and details.
5. Nature
   - Replace with trees, tufts, rocks, flowers, and bushes.
6. Farm / details
   - Replace with crops, props, windows, doors, stairs, and fences.
7. Sky and atmosphere
   - Replace with sky, fog, cloud, and smoke notes.
8. Animation
   - Replace with intended rotation, smoke, cloud drift, or water shimmer.
*/

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2299e8);
scene.fog = new THREE.Fog(0x2299e8, 20, 50);

const camera = new THREE.PerspectiveCamera(
  28,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(8, 7, 8);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 1, 0);
controls.minDistance = 5;
controls.maxDistance = 20;

const hemi = new THREE.HemisphereLight(0xffffff, 0xa4d39a, 1.25);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff2d8, 2.0);
sun.position.set(8, 12, 7);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -10;
sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10;
sun.shadow.camera.bottom = -10;
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 40;
scene.add(sun);

const M = (color, opts = {}) => new THREE.MeshStandardMaterial({
  color,
  roughness: 1,
  metalness: 0,
  ...opts
});

const mats = {
  sky: M(0x2299e8),
  grass: M(0x81c934),
  grassLight: M(0x9ce34b),
  grassDark: M(0x5fa72c),
  dirt: M(0x9b642f),
  water: M(0x13a8ef, { roughness: 0.35, metalness: 0.05 }),
  wall: M(0xd8a65a),
  roof: M(0x006eea),
  wood: M(0x8b4a18),
  stone: M(0xb7aa92),
  smoke: M(0xedf4f8, { transparent: true, opacity: 0.82 })
};

const root = new THREE.Group();
scene.add(root);

function box(w, h, d, material, x, y, z, parent = root) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  parent.add(mesh);
  return mesh;
}

function cone(r, h, segments, material, x, y, z, parent = root) {
  const mesh = new THREE.Mesh(new THREE.ConeGeometry(r, h, segments), material);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  parent.add(mesh);
  return mesh;
}

function cylinder(rTop, rBottom, h, segments, material, x, y, z, parent = root) {
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(rTop, rBottom, h, segments), material);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  parent.add(mesh);
  return mesh;
}

function sphere(r, material, x, y, z, parent = root) {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 8), material);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  parent.add(mesh);
  return mesh;
}

function tileToWorld(x, z, tilesW, tilesD) {
  return [x - tilesW / 2 + 0.5, z - tilesD / 2 + 0.5];
}

// Replace this sample block with the reconstructed asset.
box(5, 0.8, 5, mats.dirt, 0, -0.4, 0);
for (let x = 0; x < 5; x++) {
  for (let z = 0; z < 5; z++) {
    const [wx, wz] = tileToWorld(x, z, 5, 5);
    box(0.96, 0.16, 0.96, (x + z) % 2 ? mats.grassLight : mats.grass, wx, 0.1, wz);
  }
}
box(1.2, 1.3, 1.2, mats.wall, -0.4, 0.85, -0.3);
const roof = cone(1.05, 0.75, 4, mats.roof, -0.4, 1.8, -0.3);
roof.rotation.y = Math.PI / 4;
box(0.22, 0.7, 0.22, mats.stone, -0.75, 2.2, -0.55);
sphere(0.16, mats.smoke, -0.75, 2.75, -0.55);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  root.rotation.y += dt * 0.04;
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
