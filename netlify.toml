[build]
  command = "./publish.sh"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  framework = "#custom"
  autoLaunch = false

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/tiny-world-builder"
  to = "/tiny-world-builder.html"
  status = 200

[[redirects]]
  from = "/tiny-world-builder/"
  to = "/tiny-world-builder.html"
  status = 200

[[redirects]]
  from = "/roadmap"
  to = "/roadmap.html"
  status = 200

[[redirects]]
  from = "/news"
  to = "/news.html"
  status = 200

[[redirects]]
  from = "/docs"
  to = "/docs.html"
  status = 200

[[redirects]]
  from = "/features"
  to = "/features.html"
  status = 200

[[redirects]]
  from = "/community"
  to = "/community.html"
  status = 200

[[redirects]]
  from = "/admin-users"
  to = "/admin-users.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/code-of-conduct"
  to = "/code-of-conduct.html"
  status = 200

[[redirects]]
  from = "/worlds"
  to = "/worlds.html"
  status = 200

[[redirects]]
  from = "/harvest"
  to = "/harvest.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' blob: data: https: http: ws: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'"

[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sounds/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The stamp manifest is regenerated by every deploy under a stable filename,
# so it must NOT inherit the immutable /models/* rule above. Etag
# revalidation gives a cheap 304 per boot instead of a cache-busted full
# download (the app no longer appends ?ts= to this URL).
[[headers]]
  for = "/models/stamp-manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
